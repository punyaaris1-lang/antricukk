<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info MLU - FC Kelapa Gading</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Background gelap futuristik */
            background: #0f0c29; 
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            font-family: 'Montserrat', sans-serif;
        }

        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 380px;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            color: white;
        }

        /* Hiasan background (Glow effect) */
        .card::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: #ff416c;
            filter: blur(80px);
            opacity: 0.6;
            z-index: -1;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: #4b6cb7;
            filter: blur(80px);
            opacity: 0.6;
            z-index: -1;
        }

        /* --- Bagian Logo --- */
        .logo-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .mlu-logo {
            width: 120px; /* Ukuran logo, sesuaikan jika terlalu besar/kecil */
            height: auto;
            object-fit: contain;
            /* Efek bayangan biar logo makin pop-up */
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
        }

        h2 {
            margin: 0;
            font-size: 14px;
            letter-spacing: 2px;
            color: #ff416c;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 5px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
            margin-bottom: 20px;
            background: -webkit-linear-gradient(#fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .alert-box {
            background: rgba(255, 65, 108, 0.1);
            border: 1px solid rgba(255, 65, 108, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .alert-box p {
            margin: 5px 0;
            font-size: 14px;
        }
        
        .time {
            font-size: 18px; 
            font-weight: bold; 
            color: #ffcccc;
            letter-spacing: 0.5px;
        }

        .info-text {
            font-size: 14px;
            color: #cfd8dc;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .alternatives {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .alt-btn {
            background: linear-gradient(90deg, #1f4037, #99f2c8); /* Warna hijau segar untuk solusi */
            background: linear-gradient(90deg, #141E30, #243B55); /* Atau biru metalik */
            padding: 12px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .icon-pin {
            margin-right: 8px;
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="logo.png" alt="Logo MLU" class="mlu-logo">
        </div>

        <h2>Maintenance Alert</h2>
        <h1>HINDARI FC<br>KELAPA GADING</h1>

        <div class="alert-box">
            <p>⚡ Pemadaman Listrik PLN</p>
            <p class="time">11.00 WIB - Selesai</p>
            <p style="font-size: 11px; margin-top:5px; opacity: 0.7;">(Estimasi belum diketahui)</p>
        </div>

        <p class="info-text">
            Mohon maaf atas ketidaknyamanannya. 
            Silahkan merapat ke titik pengisian alternatif berikut:
        </p>

        <div class="alternatives">
            <div class="alt-btn">
                <span class="icon-pin">📍</span> CHARGING SUKAPURA
            </div>
            <div class="alt-btn">
                <span class="icon-pin">📍</span> CHARGING TIMAH
            </div>
        </div>
    </div>

</body>
</html>
