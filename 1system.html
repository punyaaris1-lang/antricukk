<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FC KELAPA GADING - SYSTEM MONITOR</title>
    
    <link rel="manifest" href="manifest.json?v=3">
    <meta name="theme-color" content="#0A1931">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@300;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --navy-dark: #071022; --navy-main: #0A1931; --navy-light: #15305B;
            --gold-dark: #B48608; --gold-main: #D4AF37; --gold-light: #FDE047;
            --bg-body: #E2E8F0;
            --white: #FFFFFF; 
            --text-dark: #0F172A; --text-gray: #64748B; --success: #10B981; --danger: #EF4444;
            --electric-blue: #2D63ED;
            
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.9);
            --glass-shadow: 0 15px 35px rgba(10, 25, 49, 0.05);
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body);
            min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column;
            -webkit-tap-highlight-color: transparent; position: relative;
        }
        
        body::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at top left, #FFFFFF 0%, transparent 60%),
                        radial-gradient(circle at bottom right, rgba(45,99,237,0.1) 0%, transparent 60%);
            z-index: -2; pointer-events: none;
        }

        * { box-sizing: border-box; outline: none; }

        .watermark-logo {
            position: absolute; right: -60px; top: 20%; width: 400px; 
            opacity: 0.10; pointer-events: none; z-index: -1;
            transform: rotate(-15deg); filter: grayscale(100%) contrast(200%);
        }

        /* --- HEADER --- */
        .header { text-align: center; margin-bottom: 20px; margin-top: 25px; position: relative; z-index: 5; } 
        .main-title { font-family: 'Outfit'; font-weight: 900; font-size: 32px; line-height: 1; color: var(--navy-main); letter-spacing: -1px; margin: 0;}
        .sub-title { font-family: 'Space Grotesk'; font-size: 10px; color: var(--text-gray); letter-spacing: 3px; font-weight: 800; text-transform: uppercase; margin-top: 6px; display: inline-block;}

        /* --- QUEUE BAR (GLASS) --- */
        .queue-bar-wrapper { width: 100%; margin-bottom: 20px; position: relative; z-index: 5; padding: 0 20px;}
        .queue-bar { background: var(--glass-bg); backdrop-filter: blur(15px); border-radius: 20px; border-left: 6px solid var(--electric-blue); border-right: 1px solid var(--glass-border); border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border); padding: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--glass-shadow); }
        
        .qb-left { display: flex; flex-direction: column; }
        .qb-lbl { font-size: 12px; color: var(--text-gray); letter-spacing: 1px; text-transform: uppercase; font-weight: 800; font-family: 'Inter'; margin-bottom: 4px;}
        .qb-val { font-family: 'Outfit'; font-weight:900; font-size: 24px; color: var(--navy-main); text-transform: uppercase; line-height: 1;}
        .qb-upcoming { font-family: 'Inter'; font-size: 12px; font-weight: 700; color: var(--text-gray); margin-top: 10px; background: #F8FAFC; padding: 6px 12px; border-radius: 8px; border-left: 3px solid var(--gold-main); display: inline-block; letter-spacing: 0.5px;}
        .qb-tot { font-family: 'Outfit'; font-weight: 900; font-size: 46px; line-height: 0.8; color: var(--electric-blue); }

        /* --- SLOT CONTAINER --- */
        .slot-container { display: flex; flex-direction: column; gap: 12px; width: 100%; position: relative; z-index: 5; flex: 1; padding: 0 20px;}
        
        .armor-card { width: 100%; min-height: 95px; position: relative; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 5px 20px rgba(10, 25, 49, 0.03); margin-bottom: 5px; cursor: pointer; overflow: hidden; transition: 0.3s;}
        
        .armor-card.active { background: white; border-color: var(--electric-blue); box-shadow: 0 15px 35px rgba(45,99,237,0.1); }

        .armor-inner { display: flex; align-items: stretch; height: 100%; width: 100%; position: relative; z-index: 2; }
        .armor-num { width: 60px; display: flex; align-items: center; justify-content: center; font-family: 'Outfit'; font-weight: 900; font-size: 28px; color: var(--text-gray); background: #F1F5F9; border-right: 1px solid #E2E8F0; flex-shrink: 0; transition: 0.3s;}
        .armor-card.active .armor-num { color: white; background: var(--electric-blue); border-color: var(--electric-blue); }
        
        .armor-content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 15px 20px; min-width: 0; gap: 5px;}
        .ac-top { display: flex; justify-content: space-between; align-items: center; }
        .info-name { font-family: 'Inter'; font-weight: 800; font-size: 14px; color: var(--text-gray); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px;}
        .armor-card.active .info-name { color: var(--text-dark); }
        .armor-badge { display: flex; justify-content: flex-end; }

        .ac-bot { display: flex; justify-content: space-between; align-items: flex-end; }
        .info-plat { font-family: 'Space Grotesk'; font-size: 32px; font-weight: 900; color: #94A3B8; letter-spacing: 1px; white-space: nowrap; margin-top: 5px; } 
        .armor-card.active .info-plat { color: var(--navy-main); }
        
        .armor-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        
        .mini-timer { font-size: 11px; color: var(--text-gray); font-family: 'Inter'; font-weight: 700; background: #F8FAFC; padding: 6px 10px; border-radius: 8px; border: 1px solid #E2E8F0; display:flex; align-items:center; gap: 6px;}
        .mini-batre { color: var(--success); font-size: 12px; font-family: 'Space Grotesk'; font-weight:900; }

        .btn-kudeta { background: #FEF2F2; border: 1px solid #FCA5A5; color: var(--danger); font-size: 10px; padding: 8px 15px; border-radius: 8px; font-weight: 900; font-family: 'Space Grotesk'; cursor: pointer; z-index: 10; transition: 0.2s;}
        .btn-kudeta:active { transform: scale(0.95); }

        .btn-pilih-slot { width: 120px; padding: 10px 0; background: var(--electric-blue); color: white; border: none; border-radius: 12px; font-family: 'Space Grotesk'; font-weight: 900; font-size: 12px; cursor: pointer; box-shadow: 0 5px 15px rgba(45,99,237,0.3); transition: 0.2s;}
        .btn-pilih-slot:active { transform: scale(0.95); }
        .badge-antrian { font-size: 10px; color: var(--electric-blue); font-weight: 800; font-family: 'Inter'; background: #EFF6FF; border: 1px solid #BFDBFE; padding: 6px 12px; border-radius: 8px; }
        .badge-locked { font-size: 10px; color: #94A3B8; font-family: 'Inter'; font-weight: 800;}

        /* --- MARKET TICKER (SLIM & COMPACT) --- */
        .market-ticker-wrapper {
            margin-top: 15px; width: 100%; background: var(--glass-bg); backdrop-filter: blur(10px);
            border-top: 1px solid white; border-bottom: 1px solid white;
            display: flex; align-items: center; overflow: hidden; position: relative; z-index: 5;
            box-shadow: 0 -5px 25px rgba(10, 25, 49, 0.03); height: 50px;
        }
        .mt-label {
            background: var(--navy-main); color: var(--gold-main); font-family: 'Outfit';
            font-weight: 900; padding: 0 25px 0 20px; font-size: 14px; letter-spacing: 1px; z-index: 10;
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
            clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%); height: 100%;
        }
        .mt-track {
            display: flex; gap: 15px; padding: 0 15px; overflow-x: auto; scrollbar-width: none;
            flex: 1; align-items: center; white-space: nowrap; height: 100%; -webkit-overflow-scrolling: touch;
        }
        .mt-track::-webkit-scrollbar { display: none; }
        
        .m-card {
            display: flex; align-items: center; gap: 10px; background: white;
            border: 1px solid #E2E8F0; padding: 4px 10px; border-radius: 8px;
            min-width: 180px; flex-shrink: 0; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            height: 40px;
        }
        .m-card.promo { border-color: var(--warning); background: #FFFBEB; }
        .m-img { width: 30px; height: 30px; border-radius: 6px; object-fit: cover; border: 1px solid #E2E8F0; }
        .m-info { display: flex; flex-direction: column; justify-content: center; }
        .m-title { font-family: 'Inter'; font-size: 11px; font-weight: 800; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; letter-spacing: 0.5px;}
        .m-price { font-family: 'Space Grotesk'; font-size: 14px; color: var(--danger); line-height: 1; margin-top: 1px; font-weight: 900;}

        /* --- BUTTON BAWAH --- */
        .bottom-action { margin-top: auto; padding: 15px 20px; display: flex; flex-direction: column; align-items: center; z-index: 50; gap: 10px;}
        
        .btn-cancel { width: 100%; padding: 16px; background: #FEF2F2; border: 1px solid #FCA5A5; color: var(--danger); font-family: 'Space Grotesk'; font-size: 16px; font-weight: 900; letter-spacing: 1px; border-radius: 16px; text-align: center; cursor: pointer; display: none; transition: 0.2s;}
        .btn-cancel:active { background: var(--danger); color: white; transform: scale(0.98); }
        
        .btn-reset-session { 
            width: 100%; padding: 16px; background: white; border: 1px solid #CBD5E1; 
            color: var(--text-gray); font-family: 'Space Grotesk'; font-size: 14px; font-weight: 900; 
            letter-spacing: 1px; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s;
        }
        .btn-reset-session:active { background: #E2E8F0; transform: scale(0.98); }

        /* --- MODALS --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,25,49,0.7); z-index: 99999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { width: 90%; max-width: 380px; background: white; border: 1px solid #E2E8F0; border-radius: 24px; padding: 30px; text-align: center; position: relative; box-shadow: 0 20px 50px rgba(10,25,49,0.2); animation: zoomIn 0.2s ease-out;}
        @keyframes zoomIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
        .modal-title { font-family: 'Outfit'; font-weight: 900; color: var(--navy-main); font-size: 24px; margin-bottom: 15px; letter-spacing: -0.5px; }
        .modal-msg { font-family: 'Inter'; color: var(--text-gray); font-size: 14px; margin-bottom: 25px; line-height: 1.5; font-weight: 500;}
        .modal-btns { display: flex; gap: 15px; justify-content: center; }
        .btn-modal { flex: 1; padding: 14px; font-family: 'Space Grotesk'; font-size: 14px; border: none; border-radius: 14px; cursor: pointer; font-weight: 800; letter-spacing: 1px; transition: 0.2s;}
        .btn-yes { background: var(--electric-blue); color: white; box-shadow: 0 5px 15px rgba(45,99,237,0.3);}
        .btn-no { background: #F1F5F9; color: var(--text-gray); border: 1px solid #E2E8F0;}
        .inp-prompt { width: 100%; padding: 15px; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 14px; color: var(--navy-main); font-family: 'Inter'; font-size: 16px; font-weight: 700; margin-bottom: 20px; text-align: center; outline: none;}
        .inp-prompt:focus { border-color: var(--electric-blue); background: white; box-shadow: 0 0 0 3px rgba(45,99,237,0.1); }

        /* LOADING */
        #loading-screen { position: fixed; inset: 0; background: var(--bg-body); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease-out; }
        .loader-spinner { width: 50px; height: 50px; border: 4px solid #E2E8F0; border-top: 4px solid var(--electric-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        .loader-text { font-family: 'Space Grotesk'; font-weight:900; color: var(--navy-main); font-size: 14px; letter-spacing: 2px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* RESTORE OVERLAY */
        .restore-overlay { display:none; position:fixed; inset:0; background:var(--bg-body); z-index:9999999; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; background-image: radial-gradient(circle at top left, #FFFFFF 0%, transparent 60%), radial-gradient(circle at bottom right, rgba(45,99,237,0.1) 0%, transparent 60%);}
        .restore-overlay h1 { color:var(--navy-main); font-family:'Outfit'; font-size:32px; font-weight:900; margin:0 0 10px; letter-spacing:-1px;}
        .restore-overlay p { color:var(--text-gray); font-family:'Inter'; font-size:14px; margin-bottom:30px; max-width:300px; line-height:1.5; font-weight:500;}
        #inpRestorePlat { width:100%; max-width:320px; padding:18px; border-radius:16px; border:2px solid var(--electric-blue); background:white; color:var(--navy-main); font-family:'Space Grotesk'; font-size:24px; font-weight:900; text-align:center; text-transform:uppercase; margin-bottom:20px; outline:none; box-shadow:0 10px 30px rgba(45,99,237,0.1); letter-spacing:2px;}
        .restore-overlay button:nth-of-type(1) { background:var(--navy-main); color:var(--gold-main); border:none; padding:18px; font-family:'Space Grotesk'; font-size:16px; font-weight:900; border-radius:16px; cursor:pointer; width:100%; max-width:320px; margin-bottom:15px; box-shadow:0 10px 30px rgba(10,25,49,0.2); letter-spacing:1px; transition:0.2s;}
        .restore-overlay button:nth-of-type(2) { background:white; color:var(--text-dark); border:1px solid #CBD5E1; padding:18px; font-family:'Space Grotesk'; font-size:14px; font-weight:800; border-radius:16px; cursor:pointer; width:100%; max-width:320px; letter-spacing:1px; box-shadow:0 5px 15px rgba(0,0,0,0.05); transition:0.2s;}
        .restore-overlay button:active { transform:scale(0.95); }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-spinner"></div>
        <div class="loader-text">MENYAMBUNGKAN...</div>
    </div>

    <!-- LAYAR PEMULIHAN SESI (TAMPIL KALAU SESI ILANG) -->
    <div class="restore-overlay" id="restoreOverlay">
        <i class="fas fa-id-badge" style="font-size:60px; color:var(--electric-blue); margin-bottom:20px;"></i>
        <h1>SESI TERPUTUS</h1>
        <p>Masukkan Plat Kendaraan Anda untuk masuk kembali ke sistem tanpa perlu scan QR ulang.</p>
        
        <input type="text" id="inpRestorePlat" placeholder="Cth: B 1234 XYZ" autocomplete="off">
        
        <button onclick="restoreSessionProcess()">PULIHKAN SESI</button>
        <button onclick="window.location.href='antrian.html'">KEMBALI KE PORTAL AWAL</button>
    </div>

    <img src="logomlumaster.png" class="watermark-logo" alt="Watermark" onerror="this.style.display='none'">

    <div id="customModal" class="modal-overlay">
        <div class="modal-box">
            <div id="modalTitle" class="modal-title">TITLE</div>
            <div id="modalMsg" class="modal-msg">Message goes here...</div>
            <input type="text" id="modalInput" class="inp-prompt" style="display:none;" autocomplete="off">
            <div id="modalBtns" class="modal-btns"></div>
        </div>
    </div>

    <div class="header" ondblclick="triggerAdminPrompt()">
        <h1 class="main-title">FC KELAPA GADING</h1>
        <div class="sub-title">MAKA LINTAS UTARA</div>
    </div>

    <div class="queue-bar-wrapper">
        <div class="queue-bar">
            <div class="qb-left">
                <span class="qb-lbl"><i class="fas fa-users"></i> ANTRIAN SEKARANG</span>
                <div class="qb-val" id="nextQDisplay">--</div>
                <div class="qb-upcoming" id="upcomingQDisplay">TIDAK ADA ANTRIAN SELANJUTNYA</div>
            </div>
            <div class="qb-right">
                <div class="qb-tot" id="totalQDisplay">0</div>
            </div>
        </div>
    </div>

    <div class="slot-container" id="slotsContainer"></div>

    <div class="market-ticker-wrapper">
        <div class="mt-label"><i class="fas fa-shopping-cart"></i> PASAR MLU</div>
        <div class="mt-track" id="marketFeed">
            <div style="color:var(--text-gray); font-family:'Inter'; font-weight:600; font-size:12px; margin-top:1px;">Memuat Katalog Pasar...</div>
        </div>
    </div>

    <div class="bottom-action">
        <button id="btnCancelQ" class="btn-cancel" onclick="cancelQueue()">❌ BATAL ANTRIAN</button>
        <button class="btn-reset-session" onclick="resetApp()"><i class="fas fa-sync-alt"></i> KELUAR / HAPUS SESI INI</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, runTransaction, collection, addDoc, getDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // === KONFIGURASI FIREBASE ===
        const firebaseConfig = { apiKey: "AIzaSyB666i9lYWIpxOdkwpoX9EvFvHLmHczeq8", authDomain: "fcgadingnew22.firebaseapp.com", projectId: "fcgadingnew22", storageBucket: "fcgadingnew22.firebasestorage.app", messagingSenderId: "537736846678", appId: "1:537736846678:web:53788d71a196423ac08af7" };
        const STATION_LAT = -6.171583; const STATION_LNG = 106.899844; 
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mainRef = doc(db, "antrian", "utama");

        // === DB STORE (UNTUK TICKER PASAR MLU) ===
        const fbStoreConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5" };
        const appStore = initializeApp(fbStoreConfig, "AppStore");
        const dbStore = getFirestore(appStore);

        const $ = (id) => document.getElementById(id);
        let localSlots = [null, null, null]; let localQueue = []; 

        // Fungsi Pembersih
        function cleanStr(s) { return s ? s.replace(/[^A-Z0-9]/gi, '').toUpperCase() : ''; }
        function cleanName(n) { return n ? n.replace(/👑/g, '').trim() : ''; } 
        function escapeHtml(text) { if (!text) return ""; return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
        function formatK(num) { if(num >= 1000000) return (num/1000000).toFixed(1) + 'jt'; if(num >= 1000) return (num/1000).toFixed(0) + 'rb'; return num; }

        // --- SISTEM LOGGER SUPER DETAIL ---
        async function catatLogSuperDetail(action, nama, plat, detailStr) {
            try {
                await addDoc(collection(db, "mlu_super_logs"), {
                    waktu: new Date().toLocaleString('id-ID'),
                    timestamp: Date.now(),
                    nama: nama || "SYSTEM",
                    plat: plat || "-",
                    action: action,
                    detail: detailStr,
                    sumber: "SYSTEM_TV_LAYAR"
                });
            } catch(e) { console.error("Gagal log aktivitas:", e); }
        }

        // --- SISTEM UI MODAL CUSTOM ---
        window.closeCustomModal = () => { $('customModal').style.display = 'none'; $('modalInput').style.display = 'none'; $('modalInput').value = ''; };

        window.showAlert = (msg, title="INFO", callback=null) => {
            $('modalTitle').innerText = title; 
            $('modalMsg').innerHTML = msg;
            $('modalBtns').innerHTML = `<button class="btn-modal btn-yes" id="btnOkAlert">OK</button>`;
            $('btnOkAlert').onclick = () => { closeCustomModal(); if(callback) callback(); };
            $('customModal').style.display = 'flex';
        };

        window.showConfirm = (msg, callback, title="KONFIRMASI") => {
            $('modalTitle').innerText = title; 
            $('modalMsg').innerHTML = msg;
            $('modalBtns').innerHTML = `<button class="btn-modal btn-no" onclick="closeCustomModal()">BATAL</button><button class="btn-modal btn-yes" id="btnYesConfirm">YA</button>`;
            $('btnYesConfirm').onclick = () => { closeCustomModal(); callback(); };
            $('customModal').style.display = 'flex';
        };

        window.showPrompt = (msg, callback, title="INPUT DIBUTUHKAN") => {
            $('modalTitle').innerText = title; 
            $('modalMsg').innerHTML = msg;
            const inp = $('modalInput'); inp.style.display = 'block'; setTimeout(()=>inp.focus(), 100);
            $('modalBtns').innerHTML = `<button class="btn-modal btn-no" onclick="closeCustomModal()">BATAL</button><button class="btn-modal btn-yes" id="btnYesPrompt">SUBMIT</button>`;
            $('btnYesPrompt').onclick = () => { const val = inp.value; closeCustomModal(); callback(val); };
            $('customModal').style.display = 'flex';
        };

        // --- GATEKEEPER & PEMULIHAN SESI ---
        let myPlat = localStorage.getItem('myPlat');
        const isSuperAdmin = localStorage.getItem('sa_sess');

        if(!myPlat && !isSuperAdmin) {
            $('restoreOverlay').style.display = 'flex';
        }
        
        setTimeout(() => { const ls = $('loading-screen'); if(ls) { ls.style.opacity = '0'; setTimeout(()=> ls.style.display = 'none', 500); } }, 1000);

        // FUNGSI PROSES PEMULIHAN SESI
        window.restoreSessionProcess = async () => {
            const p = $('inpRestorePlat').value.toUpperCase().replace(/\s+/g, '');
            if(!p) return showAlert("Masukkan Plat Kendaraan Anda terlebih dahulu!", "PERHATIAN");
            
            $('loading-screen').style.display = 'flex'; setTimeout(()=>$('loading-screen').style.opacity = '1',10);
            
            try {
                const snap = await getDoc(mainRef);
                if(snap.exists()) {
                    const d = snap.data();
                    const q = d.waitingQueue || [];
                    const s = d.chargingSlots || [];
                    
                    if(q.find(x => cleanStr(x.plat) === p) || s.find(y => y && y !== null && cleanStr(y.plat) === p)) {
                        localStorage.setItem('myPlat', p);
                        window.location.reload(); 
                    } else {
                        $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',300);
                        showAlert("Plat nomor tidak ditemukan dalam Antrean Aktif. Silakan daftar baru melalui portal depan.", "TIDAK DITEMUKAN");
                    }
                }
            } catch(e) {
                $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',300);
                showAlert("Error: " + e.message, "GAGAL MEMULIHKAN");
            }
        };

        // --- ADMIN BYPASS ---
        window.triggerAdminPrompt = () => {
            showPrompt("MASUKKAN KODE AKSES:", (pass) => {
                if(pass === "2505") { window.location.href = "admin.html"; } 
                else if (pass === "090815") { 
                    if(localStorage.getItem('sa_sess')) { localStorage.removeItem('sa_sess'); showAlert("GOD MODE MATI."); } 
                    else { localStorage.setItem('sa_sess', '1'); showAlert("GOD MODE AKTIF (Bypass GPS)."); } 
                    setTimeout(() => location.reload(), 1500); 
                }
                else if (pass) { showAlert("KODE SALAH!", "AKSES DITOLAK"); }
            }, "SYSTEM OVERRIDE");
        };

        // --- REALTIME LISTENER (UPDATE UI) ---
        onSnapshot(mainRef, (snap) => {
            if (!snap.exists()) return; 
            const d = snap.data(); localSlots = d.chargingSlots || [null, null, null]; localQueue = d.waitingQueue || []; 
            
            // --- AUTO WIPE JIKA DATA DI SERVER SUDAH TIDAK ADA ---
            if (myPlat && !isSuperAdmin) {
                const inQueue = localQueue.some(q => cleanStr(q.plat) === cleanStr(myPlat));
                const inSlot = localSlots.some(s => s && s !== null && cleanStr(s.plat) === cleanStr(myPlat));
                if (!inQueue && !inSlot) {
                    localStorage.removeItem('myPlat'); 
                    window.location.reload(); 
                    return;
                }
            }

            if(myPlat || isSuperAdmin) updateUI();
        });

        function updateUI() {
            const container = $('slotsContainer'); container.innerHTML = ''; let myQIndex = -1;
            if (myPlat && localQueue.length > 0) { myQIndex = localQueue.findIndex(q => cleanStr(q.plat) === cleanStr(myPlat)); }
            
            const btnCancel = $('btnCancelQ'); 
            if(myQIndex > -1) { btnCancel.style.display = 'block'; btnCancel.innerHTML = `❌ BATAL ANTRIAN (URUTAN #${myQIndex+1})`; } else { btnCancel.style.display = 'none'; }

            // UPDATE NEXT QUEUE DISPLAY
            $('nextQDisplay').innerText = localQueue.length > 0 ? `1. ${escapeHtml(cleanName(localQueue[0].userName))} (${localQueue[0].plat})` : "--";
            
            // UPDATE UPCOMING QUEUE
            let upcomingHtml = '';
            if(localQueue.length > 1) {
                for(let k=1; k < Math.min(4, localQueue.length); k++) {
                    upcomingHtml += `<span style="color:var(--text-gray); margin-right:15px;"><i class="fas fa-chevron-right" style="font-size:10px; opacity:0.5; color:var(--gold-main);"></i> ${k+1}. ${escapeHtml(cleanName(localQueue[k].userName))}</span>`;
                }
            }
            $('upcomingQDisplay').innerHTML = upcomingHtml || '<span style="color:var(--text-gray);"><i class="fas fa-minus-circle"></i> TIDAK ADA ANTREAN SELANJUTNYA</span>';

            localSlots.forEach((s, i) => {
                const isActive = s !== null; const div = document.createElement('div'); div.className = `armor-card ${isActive ? 'active' : ''}`;
                
                if (isActive) {
                    const role = s.role ? s.role.toUpperCase() : "GUEST"; 
                    const isMe = (cleanStr(s.plat) === cleanStr(myPlat)); 
                    let kudetaHTML = '', timerHTML = '';
                    const durationMs = Date.now() - (s.startTime || Date.now()); const durationMin = Math.floor(durationMs / 60000);
                    
                    let batVal = s.batreSisa || (s.batre ? s.batre.replace('%','') : null) || (s.battery ? s.battery.replace('%','') : "-");
                    let safeName = cleanName(s.userName); 
                    
                    if(isMe) timerHTML = `<div class="mini-timer"><span class="mini-batre"><i class="fas fa-bolt"></i> ${batVal}%</span> | ${durationMin} MIN (ANDA)</div>`; 
                    else {
                        timerHTML = `<div class="mini-timer"><span class="mini-batre"><i class="fas fa-bolt"></i> ${batVal}%</span> | ${durationMin} MIN</div>`; 
                        if (myQIndex === 0 && durationMin >= 20) { kudetaHTML = `<button class="btn-kudeta" onclick="event.stopPropagation(); window.userTriggerKudeta(${i}, '${escapeHtml(s.plat)}')">⚡ KUDETA</button>`; } 
                        else if (myQIndex === 1 && durationMin >= 25) { kudetaHTML = `<button class="btn-kudeta" onclick="event.stopPropagation(); window.userTriggerKudeta(${i}, '${escapeHtml(s.plat)}')">⚡ KUDETA</button>`; }
                    }
                    
                    div.innerHTML = `
                        <div class="armor-inner">
                            <div class="armor-num">${i+1}</div>
                            <div class="armor-content">
                                <div class="ac-top">
                                    <div class="info-name">${escapeHtml(safeName)}</div>
                                    <div class="armor-badge">${getBadgeHTML(role)}</div>
                                </div>
                                <div class="ac-bot">
                                    <div class="info-plat">${s.plat}</div>
                                    <div class="armor-actions">
                                        ${timerHTML}
                                        ${kudetaHTML}
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    if(isMe) { div.onclick = () => stopCharging(i); }
                } else {
                    let btnHTML = ''; 
                    if (localQueue.length === 0 || myQIndex === 0) btnHTML = `<button class="btn-pilih-slot" onclick="window.selectSlot(${i})">PILIH SLOT</button>`; 
                    else if (myQIndex > 0) btnHTML = `<div class="badge-antrian">ANTRIAN ${myQIndex + 1}</div>`; 
                    else btnHTML = `<div class="badge-locked">LOCKED</div>`;
                    
                    div.innerHTML = `
                        <div class="armor-inner">
                            <div class="armor-num"></div>
                            <div class="armor-content">
                                <div class="ac-top">
                                    <div class="info-name" style="color:var(--text-gray);">TERSEDIA</div>
                                </div>
                                <div class="ac-bot">
                                    <div class="info-plat" style="color:var(--text-gray); letter-spacing:3px; font-weight:700;">OPEN</div>
                                    <div class="armor-actions">${btnHTML}</div>
                                </div>
                            </div>
                        </div>`;
                }
                container.appendChild(div);
            });
            $('totalQDisplay').innerText = localQueue.length; 
        }

        function getBadgeHTML(r) {
            if (!r || r === "GUEST") return ""; 
            let css = "background:#F8FAFC; color:#64748B; border:1px solid #E2E8F0;";
            if (r.includes("KUDETA")) css = "background:#FEF2F2; color:#EF4444; border:1px solid #FCA5A5;";
            else if (r !== "MEMBER" && r !== "KELUARGA MLU") css = "background:#FFFBEB; color:#B45309; border:1px solid #FCD34D;";
            return `<span style="font-size:10px; font-weight:800; font-family:'Inter'; padding:4px 8px; border-radius:8px; ${css}">${r}</span>`;
        }

        // ========================================================
        // FUNGSI TRANSAKSI IMMUTABLE ANTI-MENTAL (BUG FIXED)
        // ========================================================

        window.selectSlot = async (i) => { 
            showConfirm(`Anda yakin ingin memasuki SLOT 0${i+1}?`, () => { 
                let userMasuk = null;
                $('loading-screen').style.display = 'flex'; setTimeout(()=>$('loading-screen').style.opacity = '1',10);
                
                runTransaction(db, async(t)=>{ 
                    const d = (await t.get(mainRef)).data(); 
                    if(d.chargingSlots[i]) throw new Error("SLOT SUDAH TERISI!"); 
                    
                    let q = [...(d.waitingQueue || [])]; 
                    const idx = q.findIndex(x => cleanStr(x.plat) === cleanStr(myPlat)); 
                    if(idx === -1) throw new Error("DATA ANTRIAN ANDA TIDAK DITEMUKAN!"); 
                    
                    // Gunakan metode Object Copying (Immutable) agar tidak bentrok
                    const oldUser = q[idx]; 
                    q.splice(idx, 1); 
                    userMasuk = { ...oldUser, startTime: Date.now() }; 
                    
                    let newSlots = [...(d.chargingSlots || [null, null, null])];
                    newSlots[i] = userMasuk; 
                    
                    t.update(mainRef, { chargingSlots: newSlots, waitingQueue: q }); 
                }).then(() => { 
                    if(userMasuk) {
                        catatLogSuperDetail("MASUK_SLOT", userMasuk.userName, userMasuk.plat, `Pindah dari Daftar Tunggu ke Slot 0${i+1} dengan sisa baterai ${userMasuk.batreSisa || '-'}%`);
                    }
                    $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',500); 
                }).catch(e => { 
                    $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',500); 
                    showAlert(e.message || e, "ERROR"); 
                }); 
            }, "MASUK SLOT"); 
        };

        window.stopCharging = (i) => { 
            showConfirm("Apakah Anda yakin sudah selesai dan ingin mengosongkan slot ini?", () => {
                let userSelesai = null;
                $('loading-screen').style.display = 'flex'; setTimeout(()=>$('loading-screen').style.opacity = '1',10);
                
                runTransaction(db, async(t)=>{ 
                    const d = (await t.get(mainRef)).data(); 
                    let slots = [...(d.chargingSlots || [null, null, null])];
                    userSelesai = slots[i]; 
                    slots[i] = null; 
                    
                    t.update(mainRef, {chargingSlots: slots}); 
                }).then(() => { 
                    if(userSelesai) {
                        catatLogSuperDetail("SELESAI_CHARGING", userSelesai.userName, userSelesai.plat, `Menyelesaikan pengisian daya di Slot 0${i+1} dan mengosongkan tempat.`);
                    }
                    localStorage.removeItem('myPlat'); 
                    window.location.reload(); 
                }).catch(e=>{ 
                    $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',500);
                    showAlert(e.message || e, "GAGAL"); 
                }); 
            }, "SELESAI CHARGING?");
        };
        
        window.userTriggerKudeta = (idx, platVictim) => {
            showConfirm(`Anda akan mengambil alih paksa slot milik ${platVictim}. Lanjutkan?`, () => {
                let userKudeta = null;
                $('loading-screen').style.display = 'flex'; setTimeout(()=>$('loading-screen').style.opacity = '1',10);
                
                runTransaction(db, async(t) => {
                    const d = (await t.get(mainRef)).data();
                    let q = [...(d.waitingQueue || [])];
                    
                    const myIdx = q.findIndex(x => cleanStr(x.plat) === cleanStr(myPlat));
                    if(myIdx === -1) throw new Error("Anda tidak terdaftar di antrian!");
                    
                    // Immutable Object Modification
                    const oldUser = q[myIdx];
                    q.splice(myIdx, 1); 
                    userKudeta = {
                        ...oldUser,
                        userName: cleanName(oldUser.userName), 
                        role: "KUDETA",
                        startTime: Date.now()
                    };
                    
                    let newSlots = [...(d.chargingSlots || [null, null, null])];
                    newSlots[idx] = userKudeta;
                    
                    t.update(mainRef, {chargingSlots: newSlots, waitingQueue: q});
                }).then(() => { 
                    if(userKudeta) {
                        catatLogSuperDetail("KUDETA", userKudeta.userName, userKudeta.plat, `Mengambil alih secara paksa Slot 0${idx+1} (Menggusur plat ${platVictim})`);
                    }
                    $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',500);
                    showAlert("Slot berhasil diambil alih!", "KUDETA SUKSES"); 
                }).catch(e => { 
                    $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',500);
                    showAlert(e.message || e, "GAGAL KUDETA"); 
                });
            }, "PERINGATAN KUDETA!");
        };

        window.cancelQueue = () => { 
            showConfirm("Apakah Anda yakin ingin membatalkan antrian dan keluar dari sistem?", () => { 
                let userBatal = null;
                $('loading-screen').style.display = 'flex'; setTimeout(()=>$('loading-screen').style.opacity = '1',10);
                
                runTransaction(db, async(t) => { 
                    const d = (await t.get(mainRef)).data(); 
                    let q = [...(d.waitingQueue || [])];
                    
                    userBatal = q.find(x => cleanStr(x.plat) === cleanStr(myPlat));
                    const newQ = q.filter(x => cleanStr(x.plat) !== cleanStr(myPlat)); 
                    
                    t.update(mainRef, { waitingQueue: newQ }); 
                }).then(() => { 
                    if(userBatal) {
                        catatLogSuperDetail("BATAL_ANTRE", userBatal.userName, userBatal.plat, `Keluar dan membatalkan antrean secara mandiri dari System TV.`);
                    }
                    localStorage.removeItem('myPlat'); 
                    window.location.reload(); 
                }).catch(e => { 
                    $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',500);
                    showAlert(e.message || e, "GAGAL"); 
                }); 
            }, "BATAL ANTRIAN?"); 
        };
        
        window.resetApp = () => showConfirm("Hapus sesi aplikasi dari perangkat ini dan kembali ke menu utama?", () => { localStorage.removeItem('myPlat'); window.location.reload(); }, "RESET SESI");

        // === LOGIKA MARKET TICKER CAROUSEL ===
        let tickerInterval;
        onSnapshot(query(collection(dbStore, 'mlu_store'), orderBy('timestamp', 'desc')), (snap) => {
            const feed = $('marketFeed');
            if (snap.empty) { feed.innerHTML = '<div style="color:#64748B; font-family:\'Inter\'; font-size:12px; margin-top:5px; font-weight:600;">Belum ada barang di pasar.</div>'; return; }
            
            feed.innerHTML = '';
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const img = p.image || 'https://placehold.co/100x100/E2E8F0/94A3B8?text=MLU';
                const priceStr = formatK(p.price);
                const isKampas = p.title.toLowerCase().includes('kampas') || p.title.toLowerCase().includes('rem');
                
                feed.innerHTML += `
                    <div class="m-card ${isKampas ? 'promo' : ''}">
                        <img src="${img}" class="m-img">
                        <div class="m-info">
                            <div class="m-title">${p.title}</div>
                            <div class="m-price">Rp ${priceStr}</div>
                        </div>
                    </div>
                `;
            });

            clearInterval(tickerInterval);
            tickerInterval = setInterval(() => {
                if (feed.scrollLeft >= feed.scrollWidth - feed.clientWidth - 5) {
                    feed.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    feed.scrollBy({ left: 2, behavior: 'auto' });
                }
            }, 30); 
            
            feed.onpointerdown = () => clearInterval(tickerInterval);
            feed.onpointerup = () => {
                clearInterval(tickerInterval);
                tickerInterval = setInterval(() => {
                    if (feed.scrollLeft >= feed.scrollWidth - feed.clientWidth - 5) { feed.scrollTo({ left: 0, behavior: 'smooth' }); } 
                    else { feed.scrollBy({ left: 2, behavior: 'auto' }); }
                }, 30);
            };
        });

    </script>
</body>
</html>
