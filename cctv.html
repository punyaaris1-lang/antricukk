<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Super Panel & CCTV</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-page: #F8FAFC; --bg-card: #FFFFFF; 
            --text-dark: #0F172A; --text-muted: #64748B; 
            --blue: #2D63ED; --blue-light: #EFF6FF;
            --red: #EF4444; --red-light: #FEF2F2;
            --green: #10B981; --green-light: #ECFDF5;
            --gold: #D4AF37; --gold-light: #FFFBEB;
            --border: #E2E8F0;
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background-color: var(--bg-page); color: var(--text-dark); 
            padding: 15px; padding-bottom: 80px; -webkit-tap-highlight-color: transparent;
        }
        * { box-sizing: border-box; outline: none; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--bg-card); padding: 15px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border);}
        .h-title { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 900; color: var(--blue); margin: 0; display: flex; align-items: center; gap: 8px;}
        .h-title i { color: var(--red); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .h-sub { font-size: 10px; color: var(--text-muted); font-weight: 800; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px;}
        .live-clock { font-family: 'JetBrains Mono'; font-size: 14px; font-weight: bold; color: var(--text-dark); background: var(--bg-page); padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border);}

        .section-title { font-family: 'Space Grotesk'; font-size: 13px; font-weight: 900; color: var(--text-dark); margin: 20px 0 10px; padding-left: 5px; text-transform: uppercase; letter-spacing: 1px;}

        /* CARDS */
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .card.active { border: 2px solid var(--blue); box-shadow: 0 10px 25px rgba(45,99,237,0.1); }
        
        /* SLOTS */
        .slot-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;}
        .slot-name { font-family: 'Space Grotesk'; font-size: 16px; font-weight: 900; color: var(--text-dark); }
        .slot-badge { font-family: 'Space Grotesk'; font-size: 12px; font-weight: 900; background: var(--green-light); color: var(--green); padding: 4px 10px; border-radius: 8px; border: 1px solid rgba(16,185,129,0.2);}
        .slot-user { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;}
        
        /* BUTTONS */
        .action-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;}
        .btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s;}
        .btn:active { transform: scale(0.95); }
        .btn-red { background: var(--red-light); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
        .btn-gold { background: var(--gold-light); color: #B45309; border: 1px solid rgba(245,158,11,0.3); }
        .btn-blue { background: var(--blue-light); color: var(--blue); border: 1px solid rgba(45,99,237,0.3); }
        .btn-green { background: var(--green); color: white; box-shadow: 0 5px 15px rgba(16,185,129,0.2);}

        /* QUEUE LIST */
        .q-item { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px dashed var(--border); margin-bottom: 12px;}
        .q-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        .q-num { width: 35px; height: 35px; background: var(--bg-page); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk'; font-weight: 900; color: var(--text-muted); font-size: 16px;}
        .q-info { flex: 1; margin-left: 12px; }
        .q-plat { font-family: 'Space Grotesk'; font-size: 15px; font-weight: 900; color: var(--text-dark); margin-bottom: 2px;}
        .q-name { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;}
        .q-batre { font-size: 10px; font-weight: 900; color: var(--green); background: var(--green-light); padding: 2px 6px; border-radius: 4px; margin-left: 5px;}

        /* CONTROL PANEL FORM */
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .form-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-page); font-family: 'Space Grotesk'; font-size: 12px; font-weight: 700; color: var(--text-dark); text-transform: uppercase;}
        .form-input:focus { border-color: var(--blue); background: white;}

        /* LOGS CCTV SECTION */
        .filter-box { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none;}
        .filter-box::-webkit-scrollbar { display: none; }
        .btn-filter { background: white; color: var(--text-muted); border: 1px solid var(--border); padding: 6px 12px; border-radius: 50px; font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; cursor: pointer; white-space: nowrap; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
        .btn-filter.active { background: var(--blue); color: white; border-color: var(--blue); }

        .log-container { display: flex; flex-direction: column; gap: 8px; }
        .log-card { 
            background: white; border-radius: 10px; padding: 10px 12px; 
            border-left: 3px solid var(--border); border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column; gap: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .lc-head { display: flex; justify-content: space-between; align-items: center; }
        .lc-time { font-size: 8px; color: var(--text-muted); font-weight: bold;}
        .lc-sumber { font-size: 8px; background: var(--bg-page); padding: 2px 5px; border-radius: 4px; color: var(--text-muted); border: 1px solid var(--border);}
        .lc-action { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; width: fit-content;}
        
        .log-card[data-action*="DAFTAR"] { border-left-color: var(--blue); }
        .log-card[data-action*="DAFTAR"] .lc-action { background: var(--blue-light); color: var(--blue); }
        .log-card[data-action*="SLOT"] { border-left-color: var(--green); }
        .log-card[data-action*="SLOT"] .lc-action { background: var(--green-light); color: var(--green); }
        .log-card[data-action*="KUDETA"] { border-left-color: var(--red); }
        .log-card[data-action*="KUDETA"] .lc-action { background: var(--red-light); color: var(--red); }
        .log-card[data-action*="KICK"] { border-left-color: var(--red); }
        .log-card[data-action*="KICK"] .lc-action { background: var(--red-light); color: var(--red); }
        .log-card[data-action*="BATAL"] { border-left-color: #94A3B8; }
        .log-card[data-action*="BATAL"] .lc-action { background: #F1F5F9; color: #64748B; }

        .lc-actor { font-family: 'Space Grotesk'; font-size: 11px; font-weight: 800; color: var(--text-dark); display: flex; align-items: center; gap: 6px; margin-top: 2px;}
        .lc-plat { font-size: 9px; background: var(--bg-page); padding: 2px 5px; border-radius: 4px; color: var(--blue); border: 1px solid var(--border);}
        .lc-detail { font-size: 9px; color: var(--text-muted); line-height: 1.3; margin-top: 2px; padding-top: 4px; border-top: 1px dashed var(--border); }

        .btn-back { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text-dark); color: white; padding: 12px 25px; border-radius: 50px; font-weight: 800; font-size: 11px; text-decoration: none; box-shadow: 0 10px 25px rgba(15,23,42,0.3); transition: 0.2s; font-family: 'Space Grotesk'; z-index: 100;}
        .btn-back:active { transform: translateX(-50%) scale(0.95); }

        /* LOADER */
        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); z-index: 999999; display: none; flex-direction: column; align-items: center; justify-content: center;}
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* MODAL CONFIRM */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 99999; opacity: 0; transition: 0.3s;}
        .modal-overlay.show { opacity: 1; display: flex; }
        .modal-box { background: white; border-radius: 20px; padding: 20px; width: 90%; max-width: 320px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); transform: scale(0.9); transition: 0.3s;}
        .modal-overlay.show .modal-box { transform: scale(1); }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><div style="font-family:'Space Grotesk'; font-size:12px; font-weight:800; color:var(--blue);">MEMPROSES...</div></div>

    <div class="header">
        <div>
            <h1 class="h-title"><i class="fas fa-video"></i> CCTV PANEL</h1>
            <div class="h-sub">Moderasi & Log Sistem MLU</div>
        </div>
        <div>
            <div class="live-clock" id="liveClock">00:00:00</div>
        </div>
    </div>

    <div class="section-title"><i class="fas fa-tv"></i> MONITOR SLOT CHARGER</div>
    <div id="slotContainer">
        <div style="text-align:center; padding:20px; color:var(--text-muted); font-size:12px;">Memuat Slot...</div>
    </div>

    <div class="section-title" style="display: flex; justify-content: space-between; align-items: center;">
        <span><i class="fas fa-users"></i> DAFTAR TUNGGU</span>
        <span style="font-size:10px; background:var(--border); padding:2px 8px; border-radius:10px;" id="qCount">0 Antre</span>
    </div>
    <div class="card" style="padding: 15px 10px;">
        <div id="queueContainer" style="max-height:300px; overflow-y:auto; padding: 0 5px;">
            <div style="text-align:center; padding:20px; color:var(--text-muted); font-size:12px;">Memuat Antrean...</div>
        </div>
    </div>

    <div class="section-title"><i class="fas fa-sliders-h"></i> ADMIN KONTROL CEPAT</div>
    
    <div class="card" style="background: var(--blue-light); border-color: rgba(45,99,237,0.2);">
        <div style="font-size:10px; font-weight:800; color:var(--blue); margin-bottom:8px;">TUKAR POSISI SLOT (SWAP)</div>
        <div style="display:flex; align-items:center; gap:8px;">
            <select id="moveSrc" class="form-input" style="padding:10px;"><option value="0">SLOT 1</option><option value="1">SLOT 2</option><option value="2">SLOT 3</option></select>
            <i class="fas fa-exchange-alt" style="color:var(--blue);"></i>
            <select id="moveDest" class="form-input" style="padding:10px;"><option value="1">SLOT 2</option><option value="2">SLOT 3</option><option value="0">SLOT 1</option></select>
            <button onclick="askConfirm('Tukar Posisi User di Slot?', moveSlotUser)" class="btn btn-blue" style="padding:10px 15px;"><i class="fas fa-check"></i></button>
        </div>
    </div>

    <div class="card" style="background: var(--gold-light); border-color: rgba(245,158,11,0.2);">
        <div style="font-size:10px; font-weight:800; color:#B45309; margin-bottom:8px;">TAMBAH USER MANUAL</div>
        <div class="input-group">
            <input id="newPlat" class="form-input" placeholder="PLAT NOMOR" style="flex:1.5;">
            <input id="newBatre" class="form-input" type="number" placeholder="BATRE %" style="flex:1;">
        </div>
        <input id="newNama" class="form-input" placeholder="NAMA PENGENDARA" style="margin-bottom:10px; width:100%; box-sizing:border-box;">
        
        <div style="display:flex; gap:8px;">
            <button onclick="manualAdd('queue')" class="btn btn-green" style="flex:2;"><i class="fas fa-plus"></i> KE ANTREAN</button>
            <button onclick="manualAdd(0)" class="btn btn-gold" style="flex:1;">S1</button>
            <button onclick="manualAdd(1)" class="btn btn-gold" style="flex:1;">S2</button>
            <button onclick="manualAdd(2)" class="btn btn-gold" style="flex:1;">S3</button>
        </div>
    </div>

    <div class="section-title" style="margin-top: 30px;"><i class="fas fa-history"></i> SUPER LOG AKTIVITAS</div>
    <div class="filter-box">
        <button class="btn-filter active" onclick="filterLog('ALL', this)">SEMUA</button>
        <button class="btn-filter" onclick="filterLog('KUDETA', this)">🔥 KUDETA</button>
        <button class="btn-filter" onclick="filterLog('SLOT', this)">SLOT</button>
        <button class="btn-filter" onclick="filterLog('ANTREAN', this)">ANTREAN</button>
        <button class="btn-filter" onclick="filterLog('ADMIN', this)">ADMIN</button>
    </div>

    <div class="log-container" id="logList">
        <div style="text-align: center; padding: 30px; color: var(--text-muted); font-size: 11px;"><i class="fas fa-spinner fa-spin"></i><br>Membaca Database Sandi...</div>
    </div>

    <a href="admin.html" class="btn-back"><i class="fas fa-arrow-left"></i> KEMBALI KE PANEL ADMIN</a>

    <div class="modal-overlay" id="customModal">
        <div class="modal-box">
            <div style="width:50px; height:50px; border-radius:50%; background:var(--red-light); color:var(--red); display:flex; align-items:center; justify-content:center; font-size:24px; margin:0 auto 15px;"><i class="fas fa-question"></i></div>
            <h2 style="margin:0 0 10px 0; font-family:'Space Grotesk'; font-weight:900; color:var(--text-dark); font-size:18px;">KONFIRMASI</h2>
            <div id="modalText" style="color:var(--text-muted); font-size:12px; line-height:1.5; margin-bottom:20px;">Text</div>
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal()" style="flex:1; padding:12px; border-radius:10px; border:none; font-family:'Space Grotesk'; font-weight:800; background:var(--bg-page); color:var(--text-muted);">BATAL</button>
                <button id="btnYes" style="flex:1; padding:12px; border-radius:10px; border:none; font-family:'Space Grotesk'; font-weight:800; background:var(--blue); color:white;">YA, LANJUT</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, runTransaction, collection, addDoc, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // === FIREBASE INIT ===
        const firebaseConfig = { apiKey: "AIzaSyB666i9lYWIpxOdkwpoX9EvFvHLmHczeq8", authDomain: "fcgadingnew22.firebaseapp.com", projectId: "fcgadingnew22" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mainRef = doc(db, "antrian", "utama");
        const logRef = collection(db, "mlu_super_logs");

        // JAM REALTIME
        setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('id-ID', { hour12: false }); }, 1000);

        // LOADER & MODAL
        window.showLoader = () => document.getElementById('loader').style.display = 'flex';
        window.hideLoader = () => document.getElementById('loader').style.display = 'none';

        let currentCallback = null;
        window.askConfirm = (text, callback) => {
            document.getElementById('modalText').innerText = text;
            const m = document.getElementById('customModal'); m.style.display = 'flex'; setTimeout(() => m.classList.add('show'), 10);
            currentCallback = callback;
        };
        document.getElementById('btnYes').onclick = () => { if(currentCallback) currentCallback(); closeModal(); };
        window.closeModal = () => { const m = document.getElementById('customModal'); m.classList.remove('show'); setTimeout(() => m.style.display = 'none', 300); currentCallback = null; };

        // TARIK IDENTITAS ADMIN
        const getAdminData = () => {
            try {
                const uData = JSON.parse(localStorage.getItem('maka_user'));
                if(uData) return { nama: uData.namaKtp || uData.namaWa || "ADMIN", plat: uData.plat || "SYSTEM", role: uData.role || "ADMIN" };
            } catch(e) {}
            return { nama: "SUPER ADMIN", plat: "CCTV", role: "SYSTEM" };
        };

        const catatSuperLog = (aksi, detail) => {
            const admin = getAdminData();
            const platClean = admin.plat.replace(/\s+/g, '').toUpperCase();
            try {
                addDoc(logRef, {
                    action: aksi, nama: admin.nama, plat: platClean, detail: detail,
                    sumber: 'CCTV PANEL', waktu: new Date().toLocaleString('id-ID'), timestamp: Date.now()
                });
            } catch(e) { console.error(e); }
        };

        // === REALTIME MONITORING (SLOT & ANTRIAN) ===
        let cachedSlots = [null, null, null];
        let cachedQueue = [];

        onSnapshot(mainRef, (snap) => {
            if (!snap.exists()) return;
            const d = snap.data();
            cachedSlots = d.chargingSlots || [null,null,null];
            cachedQueue = d.waitingQueue || [];
            updateMonitorUI();
        });

        function cleanName(n) { return n ? n.replace(/👑/g, '').trim() : 'USER'; }

        function updateMonitorUI() {
            // RENDER SLOT
            const slotCont = document.getElementById('slotContainer');
            let sHtml = '';
            cachedSlots.forEach((s, i) => {
                if(s) {
                    let bat = s.batreSisa || s.batre || s.battery || "-";
                    sHtml += `
                        <div class="card active">
                            <div class="slot-head">
                                <div class="slot-name">${s.plat}</div>
                                <div class="slot-badge"><i class="fas fa-bolt"></i> ${bat.replace('%','')} %</div>
                            </div>
                            <div class="slot-user"><i class="fas fa-user"></i> ${cleanName(s.userName)}</div>
                            <div class="action-row">
                                <button class="btn btn-red" onclick="askConfirm('Keluarkan user dari Slot 0${i+1}?', ()=>forceStop(${i}))"><i class="fas fa-power-off"></i> KICK</button>
                                <button class="btn btn-gold" onclick="askConfirm('Kembalikan ke antrean?', ()=>kickToQueue(${i}))"><i class="fas fa-undo"></i> KE ANTREAN</button>
                            </div>
                        </div>`;
                } else {
                    sHtml += `
                        <div class="card" style="background: var(--bg-page); border: 1px dashed var(--text-muted);">
                            <div class="slot-head" style="margin:0;">
                                <div class="slot-name" style="color:var(--text-muted);">SLOT 0${i+1}</div>
                                <div class="slot-badge" style="background:var(--border); color:var(--text-muted); border:none;">KOSONG</div>
                            </div>
                        </div>`;
                }
            });
            slotCont.innerHTML = sHtml;

            // RENDER ANTRIAN
            const qCont = document.getElementById('queueContainer');
            document.getElementById('qCount').innerText = `${cachedQueue.length} Antre`;
            let qHtml = '';
            if(cachedQueue.length === 0) {
                qHtml = `<div style="text-align:center; padding:20px; color:var(--text-muted); font-size:11px;">Antrian Kosong</div>`;
            } else {
                cachedQueue.forEach((q, idx) => {
                    let bat = q.batreSisa || q.batre || q.battery || "-";
                    qHtml += `
                        <div class="q-item">
                            <div class="q-num">${idx+1}</div>
                            <div class="q-info">
                                <div class="q-plat">${q.plat} <span class="q-batre">${bat.replace('%','')}%</span></div>
                                <div class="q-name">${cleanName(q.userName)}</div>
                                <div class="action-row" style="margin-top:6px;">
                                    <button class="btn btn-blue" onclick="switchQueue(${idx}, -1)"><i class="fas fa-arrow-up"></i></button>
                                    <button class="btn btn-blue" onclick="switchQueue(${idx}, 1)"><i class="fas fa-arrow-down"></i></button>
                                    <button class="btn btn-green" onclick="forceToSlot('${q.plat}', 0)">S1</button>
                                    <button class="btn btn-green" onclick="forceToSlot('${q.plat}', 1)">S2</button>
                                    <button class="btn btn-green" onclick="forceToSlot('${q.plat}', 2)">S3</button>
                                    <button class="btn btn-red" onclick="askConfirm('Hapus dari antrean?', ()=>delQueue('${q.plat}'))"><i class="fas fa-times"></i></button>
                                </div>
                            </div>
                        </div>`;
                });
            }
            qCont.innerHTML = qHtml;
        }

        // === ADMIN ACTIONS ===
        window.forceStop = (i) => {
            showLoader();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data(); const u = d.chargingSlots[i];
                if(u) { d.chargingSlots[i] = null; t.update(mainRef, { chargingSlots: d.chargingSlots }); return u; }
            }).then((u) => {
                if(u) catatSuperLog("ADMIN_KICK", `Admin mengeluarkan paksa ${u.plat} dari Slot 0${i+1}`);
                hideLoader();
            }).catch(e => { hideLoader(); alert(e); });
        };

        window.kickToQueue = (i) => {
            showLoader();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data(); const u = d.chargingSlots[i];
                if(u) { d.chargingSlots[i] = null; delete u.startTime; d.waitingQueue.unshift(u); t.update(mainRef, { chargingSlots: d.chargingSlots, waitingQueue: d.waitingQueue }); return u; }
            }).then((u) => {
                if(u) catatSuperLog("ADMIN_TURUN_TAHTA", `Admin mengembalikan ${u.plat} dari Slot 0${i+1} ke antrean`);
                hideLoader();
            }).catch(e => { hideLoader(); alert(e); });
        };

        window.switchQueue = (idx, dir) => {
            showLoader();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data(); let q = d.waitingQueue; const target = idx + dir;
                if(target >= 0 && target < q.length) {
                    const p1 = q[idx].plat; const p2 = q[target].plat; const dirTxt = dir === -1 ? "NAIK" : "TURUN";
                    [q[idx], q[target]] = [q[target], q[idx]]; t.update(mainRef, { waitingQueue: q }); return {p1, p2, dirTxt};
                } throw "Batas Antrian";
            }).then((res) => {
                catatSuperLog("ADMIN_GESER_ANTREAN", `Admin menggeser ${res.p1} ${res.dirTxt} bertukar dengan ${res.p2}`);
                hideLoader();
            }).catch(e => { hideLoader(); }); // Ignore error limit
        };

        window.delQueue = (p) => {
            showLoader();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data(); const newQ = d.waitingQueue.filter(x => x.plat !== p);
                t.update(mainRef, { waitingQueue: newQ }); return p;
            }).then((plat) => {
                catatSuperLog("ADMIN_HAPUS_ANTREAN", `Admin menghapus plat ${plat} dari daftar antrean`);
                hideLoader();
            }).catch(e => { hideLoader(); alert(e); });
        };

        window.forceToSlot = (plat, slotIdx) => {
            showLoader();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data(); if(d.chargingSlots[slotIdx]) throw "SLOT TERISI!";
                const qIdx = d.waitingQueue.findIndex(x => x.plat === plat); if(qIdx === -1) throw "User hilang dari antrean.";
                const user = d.waitingQueue.splice(qIdx, 1)[0]; user.startTime = Date.now(); d.chargingSlots[slotIdx] = user;
                t.update(mainRef, { chargingSlots: d.chargingSlots, waitingQueue: d.waitingQueue }); return plat;
            }).then((p) => {
                catatSuperLog("ADMIN_PROMOSI", `Admin memindahkan ${p} dari antrean langsung ke Slot 0${slotIdx+1}`);
                hideLoader();
            }).catch(e => { hideLoader(); alert(e); });
        };

        window.moveSlotUser = () => {
            const s1 = document.getElementById('moveSrc').value; const s2 = document.getElementById('moveDest').value;
            if(s1 == s2) return alert("Pilih slot beda!");
            showLoader();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                const n1 = d.chargingSlots[s1] ? d.chargingSlots[s1].plat : "KOSONG"; const n2 = d.chargingSlots[s2] ? d.chargingSlots[s2].plat : "KOSONG";
                const temp = d.chargingSlots[s1]; d.chargingSlots[s1] = d.chargingSlots[s2]; d.chargingSlots[s2] = temp;
                t.update(mainRef, { chargingSlots: d.chargingSlots }); return {s1, n1, s2, n2};
            }).then((r) => {
                catatSuperLog("ADMIN_SWAP_SLOT", `Admin menukar Slot 0${parseInt(r.s1)+1} (${r.n1}) dengan Slot 0${parseInt(r.s2)+1} (${r.n2})`);
                hideLoader();
            }).catch(e => { hideLoader(); alert(e); });
        };

        window.manualAdd = (target) => {
            const p = document.getElementById('newPlat').value.trim().toUpperCase();
            const n = document.getElementById('newNama').value.trim().toUpperCase();
            const b = document.getElementById('newBatre').value;
            if(!p || !b) return alert("Plat & Batre Wajib Diisi!");
            showLoader();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                if([...(d.chargingSlots||[]), ...d.waitingQueue].some(u => u && u.plat === p)) throw "User sudah ada di sistem!";
                const newNo = (d.lastTicket||0)+1; const u = { plat:p, userName:n||"MANUAL", qNo:newNo, entryTime:Date.now(), role: "MANUAL", batreSisa: b, batre: b+"%" };
                let aksi = ""; let detail = "";
                if(target === 'queue') { d.waitingQueue.push(u); aksi = "ADMIN_INPUT_ANTREAN"; detail = `Admin mendaftarkan manual ${p} ke Antrean`; } 
                else { if(d.chargingSlots[target]) throw "Slot Penuh!"; u.startTime = Date.now(); d.chargingSlots[target] = u; aksi = "ADMIN_INPUT_SLOT"; detail = `Admin memasukkan manual ${p} langsung ke Slot 0${target+1}`; }
                t.update(mainRef, { waitingQueue:d.waitingQueue, chargingSlots:d.chargingSlots, lastTicket:newNo }); return {aksi, detail};
            }).then((r) => {
                catatSuperLog(r.aksi, r.detail);
                document.getElementById('newPlat').value = ''; document.getElementById('newNama').value = ''; document.getElementById('newBatre').value = '';
                hideLoader();
            }).catch(e => { hideLoader(); alert("GAGAL: " + e); });
        };

        // === SUPER LOG RENDERER ===
        let allLogs = [];
        onSnapshot(query(logRef, orderBy("timestamp", "desc"), limit(50)), (snap) => {
            allLogs = []; snap.forEach(doc => { allLogs.push({ id: doc.id, ...doc.data() }); });
            const activeFilter = document.querySelector('.btn-filter.active').innerText.trim();
            let filterCode = 'ALL';
            if(activeFilter === '🔥 KUDETA') filterCode = 'KUDETA';
            else if(activeFilter === 'SLOT') filterCode = 'SLOT';
            else if(activeFilter === 'ANTREAN') filterCode = 'ANTREAN';
            else if(activeFilter === 'ADMIN') filterCode = 'ADMIN';
            renderLogs(filterCode);
        });

        window.filterLog = (type, btnEl) => {
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active')); btnEl.classList.add('active'); renderLogs(type);
        }

        function renderLogs(filterType) {
            const container = document.getElementById('logList'); container.innerHTML = '';
            
            const filteredLogs = allLogs.filter(log => {
                if (filterType === 'ALL') return true;
                if (filterType === 'KUDETA') return log.action.includes('KUDETA');
                if (filterType === 'SLOT') return log.action.includes('SLOT') && !log.action.includes('ADMIN');
                if (filterType === 'ANTREAN') return log.action.includes('ANTREAN') && !log.action.includes('ADMIN');
                if (filterType === 'ADMIN') return log.action.includes('ADMIN');
                return true;
            });

            if (filteredLogs.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-muted); font-size:11px;">Tidak ada histori untuk filter ini.</div>'; return;
            }

            filteredLogs.forEach((log) => {
                const dateStr = log.waktu || new Date(log.timestamp).toLocaleString('id-ID');
                let actionLabel = log.action.replace(/_/g, ' ');
                let iconHtml = '<i class="fas fa-info-circle"></i>';
                
                if(log.action.includes('KUDETA')) iconHtml = '<i class="fas fa-hand-rock"></i>';
                else if(log.action.includes('DAFTAR')) iconHtml = '<i class="fas fa-ticket-alt"></i>';
                else if(log.action.includes('SLOT')) iconHtml = '<i class="fas fa-plug"></i>';
                else if(log.action.includes('ADMIN')) iconHtml = '<i class="fas fa-user-shield"></i>';

                container.innerHTML += `
                    <div class="log-card" data-action="${log.action}">
                        <div class="lc-head">
                            <span class="lc-time">${dateStr}</span>
                            <span class="lc-sumber"><i class="fas fa-desktop"></i> ${log.sumber || 'SYSTEM'}</span>
                        </div>
                        <div style="margin-top:6px;">
                            <span class="lc-action">${iconHtml} ${actionLabel}</span>
                            <div class="lc-actor">
                                ${log.nama}
                                <span class="lc-plat">${log.plat}</span>
                            </div>
                        </div>
                        <div class="lc-detail">> ${log.detail}</div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
