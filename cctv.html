<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Super Log CCTV</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-dark: #0A0F1C; --bg-card: #111827; 
            --text-main: #E2E8F0; --text-muted: #64748B; 
            --accent-blue: #3B82F6; --accent-red: #EF4444; 
            --accent-green: #10B981; --accent-gold: #F59E0B;
        }

        body { 
            margin: 0; font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--bg-dark); color: var(--text-main); 
            padding: 20px; padding-bottom: 80px;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        * { box-sizing: border-box; outline: none; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .h-title { font-size: 24px; font-weight: 900; color: var(--accent-blue); margin: 0; letter-spacing: 1px; display: flex; align-items: center; gap: 10px;}
        .h-title i { color: var(--accent-red); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .h-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); margin-top: 5px; }

        .filter-box { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none;}
        .filter-box::-webkit-scrollbar { display: none; }
        .btn-filter { 
            background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); 
            padding: 8px 15px; border-radius: 50px; font-family: 'Space Grotesk'; font-size: 11px; font-weight: 700; 
            cursor: pointer; white-space: nowrap; transition: 0.2s;
        }
        .btn-filter.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(59,130,246,0.3); }

        .log-container { display: flex; flex-direction: column; gap: 12px; }
        .log-card { 
            background: var(--bg-card); border-radius: 12px; padding: 15px; 
            border-left: 4px solid var(--text-muted); box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column; gap: 8px;
            animation: slideIn 0.3s ease-out backwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .lc-head { display: flex; justify-content: space-between; align-items: flex-start; }
        .lc-time { font-size: 10px; color: var(--text-muted); }
        .lc-sumber { font-size: 9px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; color: #94A3B8; }

        .lc-action { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; background: rgba(255,255,255,0.1); width: fit-content; margin-bottom: 2px;}
        
        /* WARNA SPESIFIK TIAP AKSI */
        .log-card[data-action="DAFTAR_ANTREAN"] { border-left-color: var(--accent-blue); }
        .log-card[data-action="DAFTAR_ANTREAN"] .lc-action { background: rgba(59,130,246,0.2); color: #60A5FA; }

        .log-card[data-action="MASUK_SLOT"] { border-left-color: var(--accent-green); }
        .log-card[data-action="MASUK_SLOT"] .lc-action { background: rgba(16,185,129,0.2); color: #34D399; }

        .log-card[data-action="KUDETA"] { border-left-color: var(--accent-red); }
        .log-card[data-action="KUDETA"] .lc-action { background: rgba(239,68,68,0.2); color: #F87171; box-shadow: 0 0 10px rgba(239,68,68,0.2); }

        .log-card[data-action="BATAL_ANTREAN"] { border-left-color: #64748B; opacity: 0.8; }
        .log-card[data-action="BATAL_ANTREAN"] .lc-action { background: rgba(100,116,139,0.2); color: #94A3B8; }

        .log-card[data-action="SELESAI_CHARGING"] { border-left-color: #A855F7; }
        .log-card[data-action="SELESAI_CHARGING"] .lc-action { background: rgba(168,85,247,0.2); color: #C084FC; }

        .log-card[data-action="BELI_BARANG"] { border-left-color: var(--accent-gold); }
        .log-card[data-action="BELI_BARANG"] .lc-action { background: rgba(245,158,11,0.2); color: #FBBF24; }

        .lc-actor { font-family: 'Space Grotesk'; font-size: 14px; font-weight: 700; color: white; display: flex; align-items: center; gap: 8px;}
        .lc-plat { font-size: 10px; background: #1E293B; padding: 2px 6px; border-radius: 4px; color: #93C5FD; border: 1px solid #334155;}
        
        .lc-detail { font-size: 11px; color: #CBD5E1; line-height: 1.4; margin-top: 4px; padding-top: 8px; border-top: 1px dashed rgba(255,255,255,0.1); }

        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 12px; }

        .btn-back { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; color: var(--bg-dark); padding: 12px 25px; border-radius: 50px; font-weight: 800; font-size: 12px; text-decoration: none; box-shadow: 0 10px 25px rgba(255,255,255,0.1); transition: 0.2s;}
        .btn-back:active { transform: translateX(-50%) scale(0.95); }

    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1 class="h-title"><i class="fas fa-video"></i> CCTV ACTIVITY</h1>
            <div class="h-sub">Pusat Pantauan Sistem MLU</div>
        </div>
        <div style="text-align: right;">
            <div style="font-family:'JetBrains Mono'; font-size:20px; font-weight:bold; color:white;" id="liveClock">00:00:00</div>
            <div style="font-size:10px; color:var(--accent-green);"><i class="fas fa-signal"></i> SYSTEM ONLINE</div>
        </div>
    </div>

    <div class="filter-box">
        <button class="btn-filter active" onclick="filterLog('ALL', this)">SEMUA LOG</button>
        <button class="btn-filter" onclick="filterLog('KUDETA', this)">🔥 KUDETA</button>
        <button class="btn-filter" onclick="filterLog('DAFTAR_ANTREAN', this)">DAFTAR</button>
        <button class="btn-filter" onclick="filterLog('MASUK_SLOT', this)">MASUK SLOT</button>
        <button class="btn-filter" onclick="filterLog('BELI_BARANG', this)">PASAR</button>
    </div>

    <div class="log-container" id="logList">
        <div class="empty-state"><i class="fas fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 10px;"></i><br>Membaca Database Sandi...</div>
    </div>

    <a href="admin.html" class="btn-back"><i class="fas fa-arrow-left"></i> KEMBALI KE PANEL</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Ganti dengan Config Firebase Lu
        const firebaseConfig = { apiKey: "AIzaSyB666i9lYWIpxOdkwpoX9EvFvHLmHczeq8", authDomain: "fcgadingnew22.firebaseapp.com", projectId: "fcgadingnew22" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Jam Realtime
        setInterval(() => {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        }, 1000);

        let allLogs = [];

        // Tarik 50 Log Terakhir secara Realtime
        const logQuery = query(collection(db, "mlu_super_logs"), orderBy("timestamp", "desc"), limit(50));
        
        onSnapshot(logQuery, (snap) => {
            allLogs = [];
            snap.forEach(doc => {
                allLogs.push({ id: doc.id, ...doc.data() });
            });
            renderLogs('ALL');
        });

        window.filterLog = (type, btnEl) => {
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            renderLogs(type);
        }

        function renderLogs(filterType) {
            const container = document.getElementById('logList');
            container.innerHTML = '';

            const filteredLogs = filterType === 'ALL' ? allLogs : allLogs.filter(log => log.action === filterType);

            if (filteredLogs.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle" style="font-size: 24px; margin-bottom: 10px; color: #10B981;"></i><br>Tidak ada riwayat aktivitas.</div>';
                return;
            }

            filteredLogs.forEach((log, index) => {
                const dateStr = log.waktu || new Date(log.timestamp).toLocaleString('id-ID');
                
                // Rapihin format label action
                let actionLabel = log.action.replace(/_/g, ' ');

                let iconHtml = '<i class="fas fa-info-circle"></i>';
                if(log.action === 'KUDETA') iconHtml = '<i class="fas fa-hand-rock"></i>';
                if(log.action === 'DAFTAR_ANTREAN') iconHtml = '<i class="fas fa-ticket-alt"></i>';
                if(log.action === 'MASUK_SLOT') iconHtml = '<i class="fas fa-plug"></i>';
                if(log.action === 'BELI_BARANG') iconHtml = '<i class="fas fa-shopping-cart"></i>';

                container.innerHTML += `
                    <div class="log-card" data-action="${log.action}" style="animation-delay: ${index * 0.05}s">
                        <div class="lc-head">
                            <span class="lc-time">${dateStr}</span>
                            <span class="lc-sumber"><i class="fas fa-terminal"></i> ${log.sumber || 'SYSTEM'}</span>
                        </div>
                        <div>
                            <span class="lc-action">${iconHtml} ${actionLabel}</span>
                            <div class="lc-actor">
                                ${log.nama}
                                <span class="lc-plat">${log.plat}</span>
                            </div>
                        </div>
                        <div class="lc-detail">> ${log.detail}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
