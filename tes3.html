<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOCKUP SYSTEM - PHANTOM LOGO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300;500;700&family=Rajdhani:wght@500;600;700;800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-dark: #020202; 
            --gold: #D8A22E;
            --gold-glow: rgba(216, 162, 46, 0.7);
            --gold-dim: rgba(216, 162, 46, 0.15);
            --silver: #E2E8F0;
            --silver-glow: rgba(226, 232, 240, 0.5);
            --silver-dim: rgba(226, 232, 240, 0.2);
            --silver-text: #94A3B8;
            --white: #ffffff;
            --accent: #ff003c;
            --font-tech: 'Rajdhani', sans-serif;
            --font-num: 'Teko', sans-serif;
            --bg-pattern: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; }
        
        body { 
            font-family: var(--font-tech); 
            background-color: var(--bg-dark);
            background-image: var(--bg-pattern);
            background-size: 25px 25px;
            color: #fff; margin: 0; padding: 15px 20px 100px 20px; 
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- OPSI BARU: PHANTOM EMBLEM (MENGINTIP DARI KANAN) --- */
        .watermark-logo {
            position: fixed;
            right: -120px; /* Digeser ke kanan sampai setengah badannya keluar layar */
            top: 25%;
            width: 450px; /* Ukuran sangat besar */
            opacity: 0.45; /* Terang karena posisinya di area kosong */
            pointer-events: none;
            z-index: 0;
            filter: drop-shadow(0 0 30px rgba(216, 162, 46, 0.6)); 
            animation: floatSide 6s ease-in-out infinite alternate;
        }
        @keyframes floatSide {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(-20px) rotate(2deg); }
        }

        /* --- HEADER --- */
        .header { text-align: center; margin-bottom: 25px; margin-top: 10px; position: relative; z-index: 5; } 
        .main-title { font-family: var(--font-tech); font-weight: 900; font-size: 38px; line-height: 0.9; color: var(--silver); text-shadow: 0 0 15px var(--silver-dim); letter-spacing: 2px; text-transform: uppercase; }
        .sub-title { font-family: var(--font-tech); font-size: 14px; color: var(--gold); letter-spacing: 4px; font-weight: 800; text-transform: uppercase; margin-top: 10px; background: rgba(0,0,0,0.5); border:1px solid var(--gold); padding: 4px 15px; display: inline-block; box-shadow: 0 0 10px var(--gold-dim); backdrop-filter: blur(5px);}

        /* --- QUEUE BAR (KACA) --- */
        .queue-bar-wrapper { width: 100%; margin-bottom: 20px; position: relative; z-index: 5; }
        .queue-bar { background: rgba(10, 15, 30, 0.25); backdrop-filter: blur(5px); clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%); border-left: 6px solid var(--gold); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 0 15px var(--gold-dim); border-top: 1px solid rgba(226, 232, 240, 0.2); border-bottom: 1px solid rgba(226, 232, 240, 0.2); }
        .qb-lbl { font-size: 12px; color: var(--silver-text); letter-spacing: 2px; text-transform: uppercase; font-weight: 800; font-family: var(--font-tech);}
        .qb-val { font-family: var(--font-tech); font-weight:800; font-size: 24px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); text-transform: uppercase; }
        .qb-tot { font-family: var(--font-tech); font-weight: 800; font-size: 42px; line-height: 0.8; color: var(--gold); text-shadow: 0 0 15px var(--gold-glow); }

        /* --- SLOT CONTAINER & CARDS (KACA) --- */
        .slot-container { display: flex; flex-direction: column; gap: 12px; width: 100%; position: relative; z-index: 5; }
        .armor-card { width: 100%; min-height: 95px; position: relative; background: rgba(10, 15, 30, 0.25); backdrop-filter: blur(5px); clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); margin-bottom: 2px; }
        .armor-card::before { content: ''; position: absolute; inset: 0; box-shadow: inset 0 0 0 1px rgba(226, 232, 240, 0.3); pointer-events: none; z-index: 1; clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); }
        
        .armor-card.active { background: rgba(216, 162, 46, 0.1); box-shadow: inset 0 0 20px var(--gold-dim); }
        .armor-card.active::before { box-shadow: inset 0 0 0 2px var(--gold); filter: drop-shadow(0 0 8px var(--gold-glow)); }

        .armor-inner { display: flex; align-items: center; height: 100%; width: 100%; position: relative; z-index: 2; }
        .armor-num { width: 60px; height: 95px; display: flex; align-items: center; justify-content: center; font-family: var(--font-tech); font-weight: 800; font-size: 36px; color: var(--silver-text); background: rgba(0,0,0,0.4); border-right: 1px solid rgba(226, 232, 240, 0.1); flex-shrink: 0; }
        .armor-card.active .armor-num { color: var(--gold); text-shadow: 0 0 10px var(--gold-glow); border-right: 1px solid var(--gold); background: rgba(216, 162, 46, 0.15); }
        
        .armor-info { flex: 1; padding: 0 12px; display: flex; flex-direction: column; justify-content: center; }
        .info-name { font-family: var(--font-tech); font-weight: 800; font-size: 13px; color: var(--silver); letter-spacing: 1px; margin-bottom: 2px; text-transform: uppercase;}
        .armor-card.active .info-name { color: var(--gold); text-shadow: 0 0 8px var(--gold-glow); }
        .info-plat { font-family: var(--font-num); font-size: 32px; line-height: 0.9; color: #fff; letter-spacing: 1px; text-shadow: 0 0 10px rgba(0,0,0,0.8);} 
        
        .armor-badge { width: 100px; flex-shrink: 0; padding-right: 15px; display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 5px;}
        
        /* BADGE MOCKUP */
        .tactical-badge { display: flex; align-items: center; width: 90px; height: 34px; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px); }
        .tb-icon { width: 30px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 12px; background: linear-gradient(135deg, var(--gold), #B8860B); color: #000; clip-path: polygon(0 0, 100% 0, 75% 100%, 0 100%); }
        .tb-text { flex: 1; text-align: center; padding-left: 2px;}
        .tb-label { font-size: 7px; font-weight: 700; letter-spacing: 1px; color: #aaa; text-transform: uppercase; font-family: var(--font-tech); line-height: 1;}
        .tb-role { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--gold); }
        
        .mini-timer { font-size: 11px; color: #ccc; font-family: var(--font-tech); font-weight: 700; letter-spacing: 1px; background:rgba(0,0,0,0.5); padding:2px 6px; border-radius:4px;}
        .mini-batre { color: var(--silver); font-size: 12px; font-family: var(--font-tech); font-weight:900; }

        /* BUTTON KUDETA */
        .btn-kudeta { background: rgba(255,0,0,0.3); border: 1px solid var(--accent); color: var(--accent); font-size: 10px; padding: 4px 8px; font-weight: 900; transform: skewX(-10deg); letter-spacing: 1px; box-shadow: var(--accent-glow); animation: blinkKudeta 0.5s infinite; }
        @keyframes blinkKudeta { 0%, 100% { opacity: 1; box-shadow: 0 0 20px #ff0000; } 50% { opacity: 0.6; box-shadow: 0 0 5px #ff0000; } }

        /* --- BUTTON BAWAH (FONT RAJDHANI) --- */
        .bottom-action { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px 20px; background: linear-gradient(to top, rgba(2,2,2,1) 85%, transparent); z-index: 50; }
        .btn-cancel { width: 100%; padding: 18px; background: rgba(255,0,60,0.1); border: 1px solid var(--accent); color: var(--accent); font-family: var(--font-tech); font-size: 20px; font-weight: 900; letter-spacing: 2px; clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px); box-shadow: var(--accent-glow); text-align: center; cursor: pointer;}
    </style>
</head>
<body>

    <img src="logo.png" class="watermark-logo" alt="Watermark" onerror="this.style.display='none'">

    <div class="header">
        <div class="main-title">FC KELAPA GADING</div>
        <div class="sub-title">MAKA LINTAS UTARA</div>
    </div>

    <div class="queue-bar-wrapper">
        <div class="queue-bar">
            <div class="qb-left">
                <span class="qb-lbl">ANTRIAN BERIKUTNYA</span>
                <div class="qb-val">ARIS NURYANA</div>
            </div>
            <div class="qb-right">
                <div class="qb-tot">4</div>
            </div>
        </div>
    </div>

    <div class="slot-container">
        
        <div class="armor-card active">
            <div class="armor-inner">
                <div class="armor-num">1</div>
                <div class="armor-info">
                    <div class="info-name">IWAN</div>
                    <div class="info-plat">B 4650 SWE</div>
                </div>
                <div class="armor-badge">
                    <div class="tactical-badge">
                        <div class="tb-icon"><i class="fas fa-crown"></i></div>
                        <div class="tb-text"><div class="tb-label">LEADER</div><div class="tb-role">KETUM</div></div>
                    </div>
                    <div class="mini-timer">
                        <span class="mini-batre"><i class="fas fa-bolt"></i> 30%</span> | 72 MIN
                    </div>
                    <div class="btn-kudeta">⚡ KUDETA</div>
                </div>
            </div>
        </div>

        <div class="armor-card active">
            <div class="armor-inner">
                <div class="armor-num">2</div>
                <div class="armor-info">
                    <div class="info-name">ENDRO</div>
                    <div class="info-plat">B 4437 SWF</div>
                </div>
                <div class="armor-badge">
                    <div class="tactical-badge" style="border-color:#E2E8F0;">
                        <div class="tb-icon" style="background:linear-gradient(135deg, #E2E8F0, #94A3B8);"><i class="fas fa-user"></i></div>
                        <div class="tb-text"><div class="tb-role" style="color:#E2E8F0">MEMBER</div></div>
                    </div>
                    <div class="mini-timer">
                        <span class="mini-batre"><i class="fas fa-bolt"></i> 50%</span> | 8 MIN
                    </div>
                </div>
            </div>
        </div>

        <div class="armor-card">
            <div class="armor-inner">
                <div class="armor-num" style="color:rgba(255,255,255,0.2); border-color:rgba(255,255,255,0.2)">3</div>
                <div class="armor-info">
                    <div class="info-name" style="color:#aaa">TERSEDIA</div>
                    <div class="info-plat" style="color:#aaa; letter-spacing:3px;">OPEN</div>
                </div>
                <div class="armor-badge">
                    <div style="font-size:10px; color:var(--silver-text); font-weight:bold; font-family:var(--font-tech); letter-spacing:1px; background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:4px;">ANTRIAN 2</div>
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-action">
        <div class="btn-cancel">❌ BATAL ANTRIAN</div>
    </div>

</body>
</html>
