<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Pengumuman - Token Habis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Space+Grotesk:wght@700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            padding: 20px;
            font-family: 'Inter', sans-serif; 
            background-color: #050505;
            color: #E4E4E7; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            position: relative;
        }

        /* Efek Garis Monitor TV Jadul (Scanlines) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .announcement-box {
            background: #09090B;
            border: 1px solid #3F3F46;
            border-left: 4px solid #EF4444;
            width: 100%;
            max-width: 420px;
            padding: 35px 25px;
            border-radius: 12px;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.15);
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- GLITCH TITLE ANIMATION --- */
        .glitch-wrapper { text-align: center; margin-bottom: 30px; }
        
        .icon-danger {
            font-size: 45px;
            color: #EF4444;
            margin-bottom: 15px;
            animation: blinkAlert 1s infinite alternate;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
        }
        @keyframes blinkAlert { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0.5; transform: scale(0.9); } }

        .glitch {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            color: #FAFAFA;
            letter-spacing: 2px;
            margin: 0;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #09090B;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #EF4444;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #38BDF8;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 86px, 0); }
            5% { clip: rect(19px, 9999px, 12px, 0); }
            10% { clip: rect(69px, 9999px, 10px, 0); }
            15% { clip: rect(4px, 9999px, 60px, 0); }
            20% { clip: rect(48px, 9999px, 21px, 0); }
            25% { clip: rect(74px, 9999px, 86px, 0); }
            30% { clip: rect(32px, 9999px, 78px, 0); }
            35% { clip: rect(51px, 9999px, 11px, 0); }
            40% { clip: rect(83px, 9999px, 46px, 0); }
            45% { clip: rect(14px, 9999px, 76px, 0); }
            50% { clip: rect(98px, 9999px, 21px, 0); }
            55% { clip: rect(28px, 9999px, 52px, 0); }
            60% { clip: rect(86px, 9999px, 7px, 0); }
            65% { clip: rect(12px, 9999px, 41px, 0); }
            70% { clip: rect(64px, 9999px, 99px, 0); }
            75% { clip: rect(3px, 9999px, 81px, 0); }
            80% { clip: rect(77px, 9999px, 35px, 0); }
            85% { clip: rect(29px, 9999px, 54px, 0); }
            90% { clip: rect(91px, 9999px, 18px, 0); }
            95% { clip: rect(42px, 9999px, 93px, 0); }
            100% { clip: rect(17px, 9999px, 62px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            5% { clip: rect(52px, 9999px, 74px, 0); }
            10% { clip: rect(79px, 9999px, 85px, 0); }
            15% { clip: rect(75px, 9999px, 5px, 0); }
            20% { clip: rect(67px, 9999px, 61px, 0); }
            25% { clip: rect(14px, 9999px, 79px, 0); }
            30% { clip: rect(1px, 9999px, 66px, 0); }
            35% { clip: rect(86px, 9999px, 30px, 0); }
            40% { clip: rect(23px, 9999px, 98px, 0); }
            45% { clip: rect(85px, 9999px, 72px, 0); }
            50% { clip: rect(71px, 9999px, 75px, 0); }
            55% { clip: rect(2px, 9999px, 48px, 0); }
            60% { clip: rect(30px, 9999px, 16px, 0); }
            65% { clip: rect(59px, 9999px, 50px, 0); }
            70% { clip: rect(41px, 9999px, 62px, 0); }
            75% { clip: rect(2px, 9999px, 82px, 0); }
            80% { clip: rect(47px, 9999px, 73px, 0); }
            85% { clip: rect(3px, 9999px, 27px, 0); }
            90% { clip: rect(26px, 9999px, 55px, 0); }
            95% { clip: rect(42px, 9999px, 97px, 0); }
            100% { clip: rect(38px, 9999px, 49px, 0); }
        }

        /* --- BODY CONTENT --- */
        .msg-main {
            background: rgba(239, 68, 68, 0.1);
            border: 1px dashed #EF4444;
            padding: 15px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            color: #FAFAFA;
            line-height: 1.5;
            margin-bottom: 25px;
            text-align: center;
        }
        .msg-main strong { color: #EF4444; font-size: 18px; display: block; margin-top: 5px; font-family: 'JetBrains Mono', monospace; text-shadow: 0 0 10px rgba(239,68,68,0.5);}

        .irony-box {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #A1A1AA;
            line-height: 1.6;
            margin-bottom: 30px;
            border-left: 2px solid #52525B;
            padding-left: 15px;
            position: relative;
        }

        .irony-box strong { color: #F59E0B; text-decoration: underline; text-underline-offset: 3px;}

        /* Efek Mesin Tik (Typewriter) untuk teks ironi */
        .typewriter-text {
            display: inline-block;
            overflow: hidden;
            white-space: normal;
            opacity: 0;
            animation: fadeInType 0.5s ease forwards;
            animation-delay: 1.2s;
        }

        @keyframes fadeInType { to { opacity: 1; } }

        /* --- FOOTER --- */
        .footer {
            border-top: 1px solid #27272A;
            padding-top: 20px;
            text-align: center;
            opacity: 0;
            animation: slideUpFade 1s ease forwards;
            animation-delay: 1.8s;
        }

        .footer-closing { font-size: 13px; color: #71717A; margin-bottom: 5px; font-weight: 600;}
        .footer-sign { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 16px; 
            font-weight: 900; 
            color: #DCA311; 
            letter-spacing: 1.5px; 
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(220, 163, 17, 0.3);
        }

    </style>
</head>
<body>

    <div class="announcement-box">
        
        <div class="glitch-wrapper">
            <i class="fas fa-battery-empty icon-danger"></i>
            <h1 class="glitch" data-text="PENGUMUMAN">PENGUMUMAN</h1>
        </div>

        <div class="msg-main">
            FC Kelapa Gading tidak dapat digunakan karena:
            <strong>[ TOKEN HABIS ]</strong>
        </div>

        <div class="irony-box">
            <span class="typewriter-text">
                Sungguh ironi saat user terus dikejar untuk membayar sewa bahkan di hari libur, justru <strong>HAK USER</strong> untuk mendapat fasilitas charging diabaikan.
                <br>
                <br>
                <center><strong>NAGIH SEWA GERCEP,  TOKEN ABIS PADA KICEP</strong></center>
            </span>
        </div>

        <div class="footer">
            <div class="footer-closing">Pengurus</div>
            <div class="footer-sign">Maka Lintas Utara</div>
        </div>

    </div>

</body>
</html>
