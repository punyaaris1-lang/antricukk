<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU GOLDEN THUNDER HUD - NO CROWN</title>
    <link rel="manifest" href="manifest.json?v=3">
    <meta name="theme-color" content="#D8A22E">
    <link rel="apple-touch-icon" href="icon-v2-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;900&family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #020202;
            --gold: #D8A22E;
            --gold-glow: rgba(216, 162, 46, 0.7);
            --gold-dim: rgba(216, 162, 46, 0.15);
            --silver: #E2E8F0;
            --silver-glow: rgba(226, 232, 240, 0.5);
            --silver-dim: rgba(226, 232, 240, 0.2);
            --silver-text: #94A3B8;
            --white: #ffffff;
            --danger: #ff003c;
            --danger-glow: rgba(255, 0, 60, 0.6);
        }

        html, body {
            height: 100%; margin: 0; padding: 0;
            background-color: var(--bg-dark); color: var(--white);
            font-family: 'Inter', sans-serif; overflow-x: hidden; overflow-y: hidden;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .anim-mech { transition: all 0.8s cubic-bezier(0.25, 1, 0.15, 1); }

        /* --- HEADER --- */
        .top-section { text-align: center; padding: 25px 10px 0; position: relative; z-index: 20;}
        .sys-title { font-family: 'Rajdhani'; font-size: 34px; font-weight: 900; color: var(--silver); letter-spacing: 2px; margin: 0; line-height: 1; text-shadow: 0 0 10px var(--silver-dim);}
        .sys-sub { font-size: 14px; color: var(--gold); font-weight: 700; letter-spacing: 3px; margin-bottom: 8px; }

        /* --- INFO BAR SIMPLE (TANGGAL, JAM, STATUS) --- */
        .simple-info-bar {
            display: flex; justify-content: center; align-items: center; gap: 15px;
            font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 800;
            color: var(--silver-text); letter-spacing: 1px; margin-bottom: 12px;
        }
        .sib-item { display: flex; align-items: center; gap: 6px; }
        .sib-val { color: #fff; }
        .sib-status { color: #10B981; text-shadow: 0 0 8px rgba(16,185,129,0.5); }
        .sib-status i { font-size: 8px; animation: blink 1s infinite; vertical-align: middle; margin-right: 3px;}
        
        .sib-divider { width: 4px; height: 4px; border-radius: 50%; background: var(--gold-dim); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* --- THE BIG LOGO & THUNDER REVEAL --- */
        .logo-projection-area { 
            position: relative; text-align: center; margin-top: 15px; margin-bottom: 0px; 
            display: flex; flex-direction: column; align-items: center; z-index: 15;
            min-height: 130px; pointer-events: none; 
        }
        
        .clean-logo-wrap { 
            position: relative; width: 140px; height: 140px; 
            transition: all 0.8s cubic-bezier(0.25, 1, 0.15, 1); cursor: pointer; opacity: 1;
            pointer-events: auto; 
        }
        
        .logo-img { 
            width: 100%; height: 100%; object-fit: contain; 
            filter: drop-shadow(0 0 15px var(--gold-glow)); 
            position: relative; z-index: 2; opacity: 1;
        }

        .clean-logo-wrap::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 180px; height: 180px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.2) 50%, transparent 70%);
            opacity: 0; pointer-events: none; z-index: 1;
        }

        @keyframes thunderRevealCSS {
            0%, 14%  { opacity: 0; filter: brightness(0); } 
            15%, 17% { opacity: 1; filter: brightness(6) drop-shadow(0 0 30px #fff); } 
            18%, 23% { opacity: 1; filter: brightness(0); } 
            24%, 26% { opacity: 1; filter: brightness(6) drop-shadow(0 0 30px #fff); } 
            27%, 85% { opacity: 1; filter: brightness(1) drop-shadow(0 0 20px var(--gold-glow)); } 
            86%, 100%{ opacity: 0; filter: brightness(0); } 
        }
        
        @keyframes bgLightningCSS {
            0%, 14%  { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            15%, 17% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
            18%, 23% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
            24%, 26% { opacity: 1; transform: translate(-50%, -50%) scale(1.8); }
            27%, 100%{ opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        body.state-idle .logo-img { animation: thunderRevealCSS 8s infinite ease-out; }
        body.state-idle .clean-logo-wrap::before { animation: bgLightningCSS 8s infinite ease-out; }

        @keyframes floatHolo {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 10px var(--gold-glow)); }
            50%      { transform: translateY(-8px); filter: drop-shadow(0 0 20px var(--gold)); }
        }
        body.state-active .clean-logo-wrap { animation: floatHolo 3.5s ease-in-out infinite; }
        body.state-active .logo-img { animation: none; opacity: 1; filter: brightness(1) drop-shadow(0 0 15px var(--gold-glow)); }

        /* --- STATS LAYOUT --- */
        .hud-stats-wrapper {
            display: flex; justify-content: center; align-items: center; 
            gap: 70px; margin: 0 20px; position: relative; z-index: 30; 
        }

        .stat-module {
            flex: 1; max-width: 130px; display: flex; flex-direction: column; 
            align-items: center; cursor: pointer; transition: all 0.3s; pointer-events: auto;
        }

        .s-val {
            font-family: 'Rajdhani'; font-size: 42px; font-weight: 900; 
            color: var(--white); line-height: 1; margin-bottom: 6px; transition: all 0.3s;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .s-line { width: 100%; height: 2px; background: var(--silver-dim); position: relative; transition: all 0.3s; }
        .s-lbl { font-size: 15px; font-weight: 800; color: var(--silver-text); letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; transition: all 0.3s; }

        .stat-module.selected .s-val { color: var(--gold); text-shadow: 0 0 15px var(--gold-glow); transform: scale(1.05); }
        .stat-module.selected .s-line { background: var(--gold); box-shadow: 0 0 15px var(--gold-glow), 0 0 5px var(--gold); height: 3px; }
        .stat-module.selected .s-lbl { color: var(--white); text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .stat-module.has-data:not(.selected) .s-line { background: rgba(216, 162, 46, 0.4); }

        /* --- CIRCUIT DATA CONTAINER (SCROLLABLE) --- */
        .circuit-container {
            position: relative; width: 100%; padding: 0 20px; box-sizing: border-box;
            margin-top: 15px; min-height: 0; opacity: 1; overflow: hidden;
        }
        
        .trunk-line {
            position: absolute; top: -15px; width: 2px; height: 0; background: var(--gold);
            box-shadow: 0 0 10px var(--gold-glow); transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            left: 50%; transform: translateX(-50%);
        }
        .circuit-container[data-active="slot"] .trunk-line { left: calc(50% - 90px); height: 15px; }
        .circuit-container[data-active="queue"] .trunk-line { left: calc(50% + 90px); height: 15px; }

        /* AREA SCROLL DIPERBESAR */
        #renderArea {
            max-height: 38vh; overflow-y: auto; overflow-x: hidden;
            padding-right: 5px; padding-bottom: 20px; 
        }
        #renderArea::-webkit-scrollbar { width: 3px; }
        #renderArea::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 4px;}
        #renderArea::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

        .tech-line-wrap { margin-bottom: 15px; position: relative; padding-left: 15px; }
        .tech-line-wrap::before {
            content: ''; position: absolute; left: 0; top: 0; width: 2px; height: 100%; background: var(--gold); box-shadow: 0 0 8px var(--gold-glow);
            transform: scaleY(0); transform-origin: top; transition: transform 0.3s ease-out;
        }
        
        .tech-data { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px; padding-left: 10px; opacity: 0; transform: translateX(-20px); transition: all 0.4s ease; }
        .td-left { display: flex; flex-direction: column; }
        .td-plat { font-family: 'Rajdhani', monospace; font-size: 26px; font-weight: 900; color: #fff; line-height: 1; letter-spacing: 1px;}
        .td-name { font-family: 'Rajdhani', monospace; font-size: 13px; color: var(--silver-text); font-weight: 700; text-transform: uppercase; margin-top: 4px; letter-spacing: 1px;}
        .td-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
        .td-val1 { font-family: 'Rajdhani'; font-size: 22px; font-weight: 900; color: var(--white); line-height: 1; }
        .selected .td-val1 { color: var(--gold); text-shadow: 0 0 10px var(--gold-glow); }
        .td-val2 { font-size: 11px; font-weight: 800; color: #000; background: var(--gold); padding: 3px 6px; border-radius: 2px; margin-top: 4px; }

        .tech-line { height: 2px; width: 0; background: var(--gold); box-shadow: 0 0 10px var(--gold-glow); transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1); position: relative; }
        .tech-line::after { content: ''; position: absolute; right: 0; top: -2px; width: 6px; height: 6px; background: #fff; box-shadow: 0 0 10px #fff, 0 0 15px var(--gold); opacity: 0; transition: opacity 0.3s; transform: rotate(45deg); }

        .circuit-container.show-data .tech-line-wrap::before { transform: scaleY(1); }
        .circuit-container.show-data .tech-line { width: 100%; }
        .circuit-container.show-data .tech-line::after { opacity: 1; }
        .circuit-container.show-data .tech-data { opacity: 1; transform: translateX(0); }
        .tech-line-wrap:nth-child(1) .tech-line, .tech-line-wrap:nth-child(1)::before { transition-delay: 0.1s; }
        .tech-line-wrap:nth-child(1) .tech-data { transition-delay: 0.2s; }
        .tech-line-wrap:nth-child(n+2) .tech-line, .tech-line-wrap:nth-child(n+2)::before { transition-delay: 0.2s; }
        .tech-line-wrap:nth-child(n+2) .tech-data { transition-delay: 0.3s; }

        /* --- STATE IDLE & ACTIVE --- */
        body.state-idle .logo-projection-area { transform: translateY(4vh) scale(2.2); margin-bottom: 0px; }
        body.state-idle .hud-stats-wrapper { transform: translateY(12vh); opacity: 0.9; }
        body.state-idle .circuit-container { opacity: 0; max-height: 0; overflow: hidden; margin-top: 0; padding: 0; pointer-events: none; }
        
        body.state-active .logo-projection-area { transform: translateY(0) scale(1); margin-bottom: 10px; }
        body.state-active .hud-stats-wrapper { transform: translateY(0); opacity: 1; }
        body.state-active .circuit-container { opacity: 1; max-height: 1000px; }

        /* --- BOTTOM ACTION BUTTON & RESET TEXT --- */
        .bottom-action { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            padding: 15px 20px 20px; box-sizing: border-box; 
            background: linear-gradient(to top, rgba(2,2,2,1) 85%, transparent); z-index: 50; 
            display: flex; flex-direction: column; align-items: center;
        }
        .btn-main { 
            width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 4px; 
            font-family: 'Rajdhani'; font-size: 24px; font-weight: 900; text-transform: uppercase; cursor: pointer; 
            box-shadow: 0 0 15px var(--gold-glow); transition: all 0.2s; position: relative; overflow: hidden; 
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); 
        }
        .btn-main::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent); transform: skewX(-20deg); animation: shineBtn 3s infinite; }
        @keyframes shineBtn { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
        .btn-main:active { transform: scale(0.98); background: #fff; }

        /* TEKS RESET APLIKASI */
        .reset-text {
            font-family: 'Inter', sans-serif; font-size: 11px; color: var(--silver-text);
            margin-top: 12px; cursor: pointer; text-decoration: underline; letter-spacing: 1px;
            transition: color 0.2s; padding: 5px;
        }
        .reset-text:active { color: var(--danger); }

        /* --- BULLETPROOF FORM MODAL --- */
        #formModal {
            position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
            width: 100vw !important; height: 100vh !important;
            background: rgba(0,0,0,0.95) !important;
            z-index: 999999 !important; 
            display: none; 
            align-items: center; justify-content: center;
        }
        .form-panel { 
            background: #0a0a0a; border: 1px solid var(--gold); width: 85%; max-width: 400px; 
            padding: 25px; box-shadow: 0 0 40px rgba(216, 162, 46, 0.3); position: relative;
        }
        .form-panel::before, .form-panel::after { content:''; position: absolute; width: 15px; height: 15px; border: 2px solid var(--gold); }
        .form-panel::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .form-panel::after { bottom: -5px; right: -5px; border-left: none; border-top: none; }
        
        .modal-head-wrap { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #333; padding-bottom: 10px; margin-bottom: 20px;}
        .modal-head-wrap h2 { font-family: 'Rajdhani'; color: var(--gold); margin: 0; font-size: 24px; letter-spacing: 2px; }
        .btn-close-modal { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 0;}

        .inp-label { font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 2px;}
        .inp-box { width: 100%; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 0; color: #fff; font-family: 'Rajdhani'; font-size: 22px; font-weight: 800; margin-bottom: 15px; box-sizing: border-box; }
        .inp-box:focus { border-color: var(--gold); outline: none; background: rgba(216, 162, 46, 0.05);}
        .btn-kirim { width: 100%; padding: 15px; background: var(--gold); border: none; font-family: 'Rajdhani'; font-weight: 900; font-size: 20px; cursor: pointer; color: #000; margin-bottom: 10px; letter-spacing: 1px; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);}
        .btn-batal { width: 100%; padding: 12px; background: transparent; border: 1px solid #444; color: var(--silver-text); font-weight: 800; font-size: 16px; cursor: pointer; }

        /* LOADING */
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 500000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease-out; }
        .loader-spinner { width: 50px; height: 50px; border: 3px solid #111; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; box-shadow: 0 0 20px var(--gold); }
        .loader-text { font-family: 'Rajdhani'; font-weight:900; color: var(--gold); font-size: 16px; letter-spacing: 3px; animation: pulseText 1s infinite; }
        @keyframes pulseText { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="state-idle">

    <div id="loading-screen">
        <div class="loader-spinner"></div>
        <div class="loader-text">SINKRONISASI DATA...</div>
    </div>

    <div class="top-section">
        <h1 class="sys-title" ondblclick="window.toggleAdmin()">FC KELAPA GADING</h1>
        <div class="sys-sub"> RUMAH MAKA LINTAS UTARA</div>
    </div>

    <div class="simple-info-bar">
        <div class="sib-item">
            <i class="fas fa-calendar-alt" style="color:var(--gold); font-size:12px;"></i> 
            <span class="sib-val" id="t-date">--</span>
        </div>
        <div class="sib-divider"></div>
        <div class="sib-item">
            <i class="far fa-clock" style="color:var(--gold); font-size:12px;"></i> 
            <span class="sib-val" id="t-clock">--:--</span>
        </div>
        <div class="sib-divider"></div>
        <div class="sib-item sib-status">
            <i class="fas fa-circle"></i> LIVE
        </div>
    </div>

    <div class="logo-projection-area anim-mech" id="logoProjectionArea" title="Klik untuk Reset Tampilan">
        <div class="clean-logo-wrap" id="mainLogoWrap" onclick="resetToHome()">
            <img src="logomlumaster.png" alt="MLU" class="logo-img" id="theLogo" onerror="this.style.display='none'">
        </div>
    </div>

    <div class="hud-stats-wrapper anim-mech">
        <div class="stat-module" id="wrapSlot" onclick="switchTab('slot')">
            <div class="s-val" id="valSlot">0<span style="font-size: 24px; opacity: 0.5;">/3</span></div>
            <div class="s-line line-left-split"></div>
            <div class="s-lbl">SLOT</div>
        </div>

        <div class="stat-module" id="wrapQueue" onclick="switchTab('queue')">
            <div class="s-val" id="valQueue">0</div>
            <div class="s-line line-right-split"></div>
            <div class="s-lbl">ANTRIAN</div>
        </div>
    </div>

    <div class="circuit-container anim-mech" id="circuitArea" data-active="slot">
        <div class="trunk-line"></div>
        <div id="renderArea"></div>
    </div>

    <div class="bottom-action">
        <button id="btnDaftar" class="btn-main" onclick="checkLocationAndOpenForm()">[ DAFTAR ANTRIAN ]</button>
        <div class="reset-text" onclick="resetAplikasi()">Hapus Sesi / Reset Aplikasi</div>
    </div>

    <div id="formModal">
        <div class="form-panel">
            <div class="modal-head-wrap">
                <h2>TRANSMISI DATA</h2>
                <button class="btn-close-modal" onclick="closeModal('formModal')">✕</button>
            </div>
            
            <span class="inp-label">IDENTITAS PILOT</span>
            <input type="text" id="inpNama" class="inp-box" placeholder="Ketik Nama">
            
            <span class="inp-label">VEHICLE ID (Spasi)</span>
            <input type="text" id="inpPlat" class="inp-box" placeholder="B 1234 XYZ">
            
            <span class="inp-label">LEVEL ENERGI SEKARANG (%)</span>
            <input type="number" id="inpBatre" class="inp-box" placeholder="Contoh: 15" min="0" max="100">
            
            <button class="btn-kirim" onclick="submitData()">INISIASI SISTEM</button>
            <button class="btn-batal" onclick="closeModal('formModal')">BATAL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const STATION_LAT = -6.171583; const STATION_LNG = 106.899844; const MAX_DIST_KM = 0.2; 
        const firebaseConfig = { apiKey: "AIzaSyB666i9lYWIpxOdkwpoX9EvFvHLmHczeq8", authDomain: "fcgadingnew22.firebaseapp.com", projectId: "fcgadingnew22", storageBucket: "fcgadingnew22.firebasestorage.app", messagingSenderId: "537736846678", appId: "1:537736846678:web:53788d71a196423ac08af7" };
        
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const mainRef = doc(db, "antrian", "utama");
        const TOTAL_SLOTS = 3;
        
        let globalSlots = [null, null, null]; let globalQueue = []; let currentTab = null; let isIdleMode = true; 
        let autoRevertTimeoutID = null; 

        // Fungsi Pembersih Spasi Plat
        const cleanStr = (s) => s ? s.replace(/[^A-Z0-9]/gi, '').toUpperCase() : '';
        
        // Fungsi Pembersih MAHKOTA (Crown Removal)
        const cleanName = (n) => n ? n.replace(/👑/g, '').trim() : '';

        // --- HACKER DECRYPT SCRAMBLE TEXT ---
        function scrambleText(element, finalStr) {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let iterations = 0;
            const interval = setInterval(() => {
                element.innerText = finalStr.split('').map((c, i) => {
                    if (c === ' ') return ' '; if (i < iterations) return finalStr[i];
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join('');
                if (iterations >= finalStr.length) clearInterval(interval); iterations += 1/2; 
            }, 30);
        }

        // --- TIMERS PENGGANTI (Tanggal & Jam Realtime Simple) ---
        function updateTimers() {
            const now = new Date(); 
            const dStr = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
            document.getElementById('t-date').innerText = dStr.toUpperCase(); 
            
            const hStr = String(now.getHours()).padStart(2, '0');
            const mStr = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('t-clock').innerText = `${hStr}:${mStr}`;
        } 
        setInterval(updateTimers, 1000); updateTimers();

        // --- SISTEM AUTO REVERT KE HOME 1 MENIT ---
        function startAutoRevertTimer() {
            if (autoRevertTimeoutID) clearTimeout(autoRevertTimeoutID);
            autoRevertTimeoutID = setTimeout(() => {
                if (document.getElementById('formModal').style.display !== 'flex') { resetToHome(); } 
                else { startAutoRevertTimer(); }
            }, 60000); 
        }
        function stopAutoRevertTimer() {
            if (autoRevertTimeoutID) clearTimeout(autoRevertTimeoutID);
            autoRevertTimeoutID = null;
        }

        window.resetToHome = () => {
            if (isIdleMode) return; 
            isIdleMode = true; currentTab = null; stopAutoRevertTimer();
            const circuit = document.getElementById('circuitArea'); circuit.classList.remove('show-data');
            document.getElementById('wrapSlot').classList.remove('selected'); document.getElementById('wrapQueue').classList.remove('selected');
            document.body.classList.remove('state-active'); document.body.classList.add('state-idle');
        };

        window.switchTab = (tab) => {
            currentTab = tab;
            const wrapSlot = document.getElementById('wrapSlot'); const wrapQueue = document.getElementById('wrapQueue');
            const circuit = document.getElementById('circuitArea');
            startAutoRevertTimer();

            if (isIdleMode) {
                isIdleMode = false;
                document.body.classList.remove('state-idle'); document.body.classList.add('state-active');
                setTimeout(() => { executeTabSwitch(tab, wrapSlot, wrapQueue, circuit); }, 600);
            } else {
                executeTabSwitch(tab, wrapSlot, wrapQueue, circuit);
            }
        };

        function executeTabSwitch(tab, wrapSlot, wrapQueue, circuit) {
            circuit.classList.remove('show-data');
            if(tab === 'slot') { wrapSlot.classList.add('selected'); wrapQueue.classList.remove('selected'); circuit.setAttribute('data-active', 'slot'); } 
            else { wrapQueue.classList.add('selected'); wrapSlot.classList.remove('selected'); circuit.setAttribute('data-active', 'queue'); }
            setTimeout(() => { renderData(); void circuit.offsetWidth; circuit.classList.add('show-data'); document.querySelectorAll('.scramble-target').forEach(el => { scrambleText(el, el.getAttribute('data-text')); }); }, 100);
        }

        function renderData() {
            const area = document.getElementById('renderArea'); area.innerHTML = '';
            if (currentTab === 'slot') {
                globalSlots.forEach((s, i) => {
                    let lineColor = s ? "var(--gold)" : "#333"; let glow = s ? "0 0 10px var(--gold-glow)" : "none";
                    let platTxt = s ? s.plat : "SLOT 0" + (i+1); 
                    
                    let nameTxt = s ? cleanName(s.userName) : "TERSEDIA";
                    let val1 = s ? (s.startTime ? Math.floor((Date.now() - s.startTime)/60000) + " M" : "BARU") : "--"; 
                    
                    let getBat = "0";
                    if(s) { getBat = s.batreSisa || (s.batre ? s.batre.replace('%','') : null) || (s.battery ? s.battery.replace('%','') : "0"); }
                    let val2 = s ? `BAT: ${getBat}%` : "STANDBY";
                    
                    area.innerHTML += `<div class="tech-line-wrap"><div class="tech-data"><div class="td-left"><span class="td-plat scramble-target" data-text="${platTxt}" style="${!s ? 'color:#555' : ''}">${platTxt}</span><span class="td-name scramble-target" data-text="${nameTxt}">${nameTxt}</span></div><div class="td-right" style="${!s ? 'opacity:0.3' : ''}"><span class="td-val1">${val1}</span><span class="td-val2" style="${!s ? 'background:#333; color:#888' : ''}">${val2}</span></div></div><div class="tech-line" style="background:${lineColor}; box-shadow:${glow};"></div></div>`;
                });
            } else {
                if(globalQueue.length === 0) {
                    area.innerHTML = `<div style="text-align:center; color:#555; font-size:16px; font-weight:700; margin-top:50px; font-family:'Rajdhani'; letter-spacing:2px;" class="scramble-target" data-text="-- KOSONG --">-- KOSONG --</div>`;
                } else {
                    globalQueue.forEach((q, i) => {
                        let safeName = cleanName(q.userName);
                        let nameFormat = `#0${i+1} // ${safeName}`;
                        
                        let getBat = q.batreSisa || (q.batre ? q.batre.replace('%','') : null) || (q.battery ? q.battery.replace('%','') : "0");
                        
                        area.innerHTML += `<div class="tech-line-wrap"><div class="tech-data"><div class="td-left"><span class="td-plat scramble-target" data-text="${q.plat}" style="font-size:24px;">${q.plat}</span><span class="td-name scramble-target" data-text="${nameFormat}">${nameFormat}</span></div><div class="td-right"><span class="td-val1" style="font-size:20px; color:#fff;">${getBat}%</span></div></div><div class="tech-line" style="background:#555; box-shadow:none;"></div></div>`;
                    });
                }
            }
        }

        // --- SISTEM MODAL, ADMIN, DAFTAR & RESET ---
        window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
        
        window.toggleAdmin = () => { 
            const p = prompt("ACCESS CODE:"); 
            if (p === "2505") window.location.href = "admin.html"; 
            else if (p === "090815") { if(localStorage.getItem('sa_sess')) { localStorage.removeItem('sa_sess'); alert("GOD MODE OFFLINE."); } else { localStorage.setItem('sa_sess', '1'); alert("GOD MODE ONLINE."); } location.reload(); } else if(p) alert("ACCESS DENIED."); 
        };

        window.resetAplikasi = () => {
            if(confirm("Hapus data sesi aplikasi di HP ini?\nGunakan ini jika Anda tidak bisa mendaftar.")) {
                localStorage.removeItem('myPlat');
                localStorage.removeItem('sa_sess');
                alert("Sistem berhasil di-reset!");
                location.reload();
            }
        };

        window.checkLocationAndOpenForm = () => { 
            const btn = document.getElementById('btnDaftar'); 
            if(btn.innerHTML.includes('SYSTEM')) { window.location.href = 'system.html'; return; } 
            
            if (currentTab) startAutoRevertTimer();
            if(localStorage.getItem('sa_sess')) { document.getElementById('formModal').style.display = 'flex'; return; } 
            
            if (!navigator.geolocation) return alert("GPS REQUIRED!"); 
            const ori = btn.innerHTML; btn.innerHTML = '[ MENCARI LOKASI... ]'; 
            navigator.geolocation.getCurrentPosition((pos) => { 
                const p = 0.017453292519943295; const c = Math.cos; const a = 0.5 - c((pos.coords.latitude - STATION_LAT) * p)/2 + c(STATION_LAT * p) * c(pos.coords.latitude * p) * (1 - c((pos.coords.longitude - STATION_LNG) * p))/2; const dist = 12742 * Math.asin(Math.sqrt(a)); btn.innerHTML = ori; 
                if (dist <= MAX_DIST_KM) { document.getElementById('formModal').style.display = 'flex'; } else { alert(`AKSES DITOLAK!\nJarak Anda Kejauhan.`); } 
            }, () => { btn.innerHTML = ori; alert("SIGNAL GPS HILANG."); }, { enableHighAccuracy: true }); 
        };

        window.submitData = async () => { 
            const n = document.getElementById('inpNama').value.toUpperCase(); 
            const p = document.getElementById('inpPlat').value.toUpperCase(); 
            const b = document.getElementById('inpBatre').value; 
            
            if(!n || !p || !b) return alert("DATA TIDAK LENGKAP!"); 
            if(parseInt(b) > 100) return alert("BATERAI MAX 100%"); 
            const btn = document.querySelector('.btn-kirim'); btn.innerText = "TRANSMITTING..."; 
            
            try { 
                let role = "GUEST"; 
                try { const qs = await getDocs(query(collection(db, "mlu_members"), where("plat", "==", p))); if(!qs.empty) role = qs.docs[0].data().role || "MEMBER"; } catch(e) {} 
                
                const snap = await getDoc(mainRef); 
                if(snap.exists()) { 
                    let d = snap.data(); let q = d.waitingQueue || []; let s = d.chargingSlots || []; 
                    
                    if(q.find(x => cleanStr(x.plat) === cleanStr(p)) || s.find(y => y && cleanStr(y.plat) === cleanStr(p))) { 
                        alert("KENDARAAN SUDAH TERDAFTAR!"); localStorage.setItem('myPlat', p); window.location.href = 'system.html'; return; 
                    } 
                    
                    q.push({ userName: n, plat: p, batre: b + "%", battery: b + "%", batreSisa: b, role: role, timestamp: Date.now(), qNo: (d.lastTicket || 0) + 1 }); 
                    await updateDoc(mainRef, { waitingQueue: q, lastTicket: (d.lastTicket || 0) + 1 }); 
                    
                    localStorage.setItem('myPlat', p); alert("SUKSES!"); window.location.href = 'system.html'; 
                } 
            } catch(e) { alert("ERROR: " + e.message); btn.innerText = "INISIASI SISTEM"; } 
        };

        function checkMyTicketState() { 
            if(localStorage.getItem('myPlat')) { 
                const btn = document.getElementById('btnDaftar'); btn.innerHTML = '[ MASUK KE SYSTEM ]'; btn.style.background = "#fff"; btn.style.color = "#000"; btn.style.boxShadow = "none"; 
            } 
        } 
        checkMyTicketState();

        onSnapshot(mainRef, (snap) => {
            const ls = document.getElementById('loading-screen');
            if(ls) { ls.style.opacity = '0'; setTimeout(() => { ls.style.display = 'none'; }, 500); }

            if (!snap.exists()) return; const d = snap.data(); globalSlots = d.chargingSlots || [null, null, null]; globalQueue = d.waitingQueue || [];
            let usedCount = globalSlots.filter(s => s !== null).length;
            
            document.getElementById('valSlot').innerHTML = `${usedCount}<span style="font-size: 24px; opacity: 0.5;">/${TOTAL_SLOTS}</span>`; 
            document.getElementById('valQueue').innerText = globalQueue.length;
            
            const wSlot = document.getElementById('wrapSlot'); const wQueue = document.getElementById('wrapQueue');
            if(usedCount > 0) wSlot.classList.add('has-data'); else wSlot.classList.remove('has-data');
            if(globalQueue.length > 0) wQueue.classList.add('has-data'); else wQueue.classList.remove('has-data');
            
            if (!isIdleMode) { renderData(); document.querySelectorAll('.scramble-target').forEach(el => { scrambleText(el, el.getAttribute('data-text')); }); }
        });

        document.getElementById('inpPlat').addEventListener('input', function() { let v=this.value.toUpperCase().replace(/[^A-Z0-9]/g, ''); let m=v.match(/^([A-Z]{1,2})(\d{0,4})([A-Z]*)$/); this.value=m?`${m[1]}${m[2]?' '+m[2]:''}${m[3]?' '+m[3]:''}`:v; });
        document.getElementById('inpBatre').addEventListener('input', function() { let v=this.value.replace(/[^0-9]/g, ''); if(parseInt(v)>100)v="100"; this.value=v; });
    </script>
</body>
</html>
