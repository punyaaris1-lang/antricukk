<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FC KELAPA GADING - SYSTEM PHANTOM FIXED</title>
    
    <link rel="manifest" href="manifest.json?v=3">
    <meta name="theme-color" content="#D8A22E">
    
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300;500;700&family=Rajdhani:wght@500;600;700;800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-dark: #020202; 
            --gold: #D8A22E;
            --gold-glow: rgba(216, 162, 46, 0.7);
            --gold-dim: rgba(216, 162, 46, 0.15);
            --silver: #E2E8F0;
            --silver-glow: rgba(226, 232, 240, 0.5);
            --silver-dim: rgba(226, 232, 240, 0.2);
            --silver-text: #94A3B8;
            --white: #ffffff;
            --accent: #ff003c;
            --accent-glow: 0 0 15px rgba(255, 0, 60, 0.5);
            --font-tech: 'Rajdhani', sans-serif;
            --font-num: 'Teko', sans-serif;
            --bg-pattern: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; }
        
        body { 
            font-family: var(--font-tech); 
            background-color: var(--bg-dark);
            background-image: var(--bg-pattern);
            background-size: 25px 25px;
            color: #fff; margin: 0; padding: 15px 20px 100px 20px; 
            min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column;
        }

        /* --- THE PHANTOM EMBLEM --- */
        .watermark-logo {
            position: fixed; right: -120px; top: 25%; width: 450px; 
            opacity: 0.45; pointer-events: none; z-index: 0;
            filter: drop-shadow(0 0 30px rgba(216, 162, 46, 0.6)); 
            animation: floatSide 6s ease-in-out infinite alternate;
        }
        @keyframes floatSide {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(-20px) rotate(2deg); }
        }

        /* --- HEADER --- */
        .header { text-align: center; margin-bottom: 20px; margin-top: 10px; position: relative; z-index: 5; } 
        .main-title { font-family: var(--font-tech); font-weight: 900; font-size: 38px; line-height: 0.9; color: var(--silver); text-shadow: 0 0 15px var(--silver-dim); letter-spacing: 2px; text-transform: uppercase; }
        .sub-title { font-family: var(--font-tech); font-size: 14px; color: var(--gold); letter-spacing: 4px; font-weight: 800; text-transform: uppercase; margin-top: 10px; background: rgba(0,0,0,0.5); border:1px solid var(--gold); padding: 4px 15px; display: inline-block; box-shadow: 0 0 10px var(--gold-dim); backdrop-filter: blur(5px);}

        /* --- QUEUE BAR (GLASS) & UPCOMING FIX --- */
        .queue-bar-wrapper { width: 100%; margin-bottom: 20px; position: relative; z-index: 5; }
        .queue-bar { background: rgba(10, 15, 30, 0.4); backdrop-filter: blur(5px); clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%); border-left: 6px solid var(--gold); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 0 15px var(--gold-dim); border-top: 1px solid rgba(226, 232, 240, 0.2); border-bottom: 1px solid rgba(226, 232, 240, 0.2); }
        
        .qb-left { display: flex; flex-direction: column; }
        .qb-lbl { font-size: 12px; color: var(--silver-text); letter-spacing: 2px; text-transform: uppercase; font-weight: 800; font-family: var(--font-tech); margin-bottom: 2px;}
        .qb-val { font-family: var(--font-tech); font-weight:800; font-size: 26px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); text-transform: uppercase; line-height: 1;}
        .qb-upcoming { font-family: var(--font-tech); font-size: 13px; color: var(--silver-text); margin-top: 8px; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 4px; border-left: 2px solid var(--accent); display: inline-block; font-weight: 600; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
        .qb-tot { font-family: var(--font-tech); font-weight: 800; font-size: 42px; line-height: 0.8; color: var(--gold); text-shadow: 0 0 15px var(--gold-glow); }

        /* --- SLOT CONTAINER --- */
        .slot-container { display: flex; flex-direction: column; gap: 12px; width: 100%; position: relative; z-index: 5; flex: 1;}
        .armor-card { width: 100%; min-height: 95px; position: relative; background: rgba(10, 15, 30, 0.25); backdrop-filter: blur(5px); clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); margin-bottom: 2px; cursor: pointer; }
        .armor-card::before { content: ''; position: absolute; inset: 0; box-shadow: inset 0 0 0 1px rgba(226, 232, 240, 0.3); pointer-events: none; z-index: 1; clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); }
        
        .armor-card.active { background: rgba(216, 162, 46, 0.1); box-shadow: inset 0 0 20px var(--gold-dim); }
        .armor-card.active::before { box-shadow: inset 0 0 0 2px var(--gold); filter: drop-shadow(0 0 8px var(--gold-glow)); }

        .armor-inner { display: flex; align-items: stretch; height: 100%; width: 100%; position: relative; z-index: 2; }
        .armor-num { width: 50px; display: flex; align-items: center; justify-content: center; font-family: var(--font-tech); font-weight: 800; font-size: 32px; color: var(--silver-text); background: rgba(0,0,0,0.4); border-right: 1px solid rgba(226, 232, 240, 0.1); flex-shrink: 0; }
        .armor-card.active .armor-num { color: var(--gold); text-shadow: 0 0 10px var(--gold-glow); border-right: 1px solid var(--gold); background: rgba(216, 162, 46, 0.15); }
        
        .armor-content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 12px 15px; min-width: 0; gap: 5px;}
        .ac-top { display: flex; justify-content: space-between; align-items: center; }
        .info-name { font-family: var(--font-tech); font-weight: 800; font-size: 14px; color: var(--silver); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 1px;}
        .armor-card.active .info-name { color: var(--gold); text-shadow: 0 0 8px var(--gold-glow); }
        .armor-badge { display: flex; justify-content: flex-end; }

        .ac-bot { display: flex; justify-content: space-between; align-items: flex-end; }
        .info-plat { font-family: var(--font-num); font-size: 34px; line-height: 0.8; color: #fff; letter-spacing: 1px; white-space: nowrap; text-shadow: 0 0 10px rgba(0,0,0,0.8); margin-top: 4px; } 
        .armor-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        
        /* BADGE SYSTEM */
        .tactical-badge { display: inline-flex; align-items: center; height: 26px; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); clip-path: polygon(8px 0, 100% 0, 100% 100%, 0 100%, 0 8px); }
        .tb-icon { width: 24px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #000; clip-path: polygon(0 0, 100% 0, 75% 100%, 0 100%); margin-right: -2px; z-index: 2; position: relative; }
        .tb-text { display: flex; flex-direction: column; justify-content: center; padding: 0 8px 0 4px; text-align: left; z-index: 1; }
        .tb-label { font-size: 7px; font-weight: 700; letter-spacing: 1px; color: #aaa; text-transform: uppercase; font-family: var(--font-tech); line-height: 1; margin-bottom: 2px;}
        .tb-role { font-size: 10px; font-weight: 800; text-transform: uppercase; line-height: 1;}

        /* Badge Variants */
        .b-platinum { border-color: #E5E4E2; } .b-platinum .tb-icon { background: linear-gradient(135deg, #E5E4E2, #708090); } .b-platinum .tb-role { color: #E5E4E2; }
        .b-gold { border-color: #FFD700; } .b-gold .tb-icon { background: linear-gradient(135deg, #FFD700, #B8860B); } .b-gold .tb-role { color: #FFD700; } 
        .b-cyan { border-color: #E2E8F0; } .b-cyan .tb-icon { background: linear-gradient(135deg, #E2E8F0, #94A3B8); } .b-cyan .tb-role { color: #E2E8F0; }
        .b-family { border-color: #fff; } .b-family .tb-icon { background: linear-gradient(135deg, #ffffff 0%, #bdc3c7 100%); color: #D80027; } .b-family .tb-role { color: #fff; }
        .b-ninja { border-color: #333; background: #000; } .b-ninja .tb-icon { background: #111; color: #ccc; border-right: 1px solid #333; } .b-ninja .tb-role { color: #aaa; }
        
        .mini-timer { font-size: 11px; color: #ccc; font-family: var(--font-tech); font-weight: 700; letter-spacing: 1px; background:rgba(0,0,0,0.5); padding:3px 8px; border-radius:4px; display:flex; align-items:center; gap: 6px;}
        .mini-batre { color: var(--silver); font-size: 13px; font-family: var(--font-tech); font-weight:900; }

        .btn-kudeta { background: rgba(255,0,0,0.3); border: 1px solid var(--accent); color: var(--accent); font-size: 10px; padding: 4px 12px; font-weight: 900; transform: skewX(-10deg); letter-spacing: 1px; box-shadow: var(--accent-glow); animation: blinkKudeta 0.5s infinite; cursor: pointer; z-index: 10;}
        @keyframes blinkKudeta { 0%, 100% { opacity: 1; box-shadow: 0 0 20px #ff0000; } 50% { opacity: 0.6; box-shadow: 0 0 5px #ff0000; } }

        .btn-pilih-slot { width: 100px; padding: 6px 0; background: var(--gold); color: #000; border: none; border-radius: 3px; font-family: var(--font-tech); font-weight: 900; font-size: 14px; cursor: pointer; box-shadow: 0 0 10px rgba(216,162,46,0.5); }
        .badge-antrian { font-size: 10px; color: var(--silver-text); font-weight: bold; font-family: var(--font-tech); letter-spacing: 1px; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 4px; }
        .badge-locked { font-size: 10px; color: #444; font-family: var(--font-tech); letter-spacing: 1px; font-weight: bold;}

        /* --- MARKET TICKER (NEW HOLOGRAM UI) --- */
        .market-ticker-wrapper {
            margin-top: 15px; width: 100%; background: rgba(10, 15, 30, 0.6); border-top: 1px solid rgba(216, 162, 46, 0.4); border-bottom: 1px solid rgba(216, 162, 46, 0.4);
            display: flex; align-items: center; overflow: hidden; position: relative; z-index: 5;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
        }
        .mt-label {
            background: linear-gradient(135deg, var(--gold), #B48608); color: #000; font-family: var(--font-tech);
            font-weight: 900; padding: 15px; font-size: 16px; letter-spacing: 1px; z-index: 10;
            box-shadow: 10px 0 20px rgba(0,0,0,0.6); display: flex; align-items: center; gap: 8px; flex-shrink: 0;
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%); padding-right: 25px;
        }
        .mt-track {
            display: flex; gap: 15px; padding: 10px 15px; overflow-x: auto; scrollbar-width: none;
            flex: 1; align-items: center; white-space: nowrap; -webkit-overflow-scrolling: touch;
        }
        .mt-track::-webkit-scrollbar { display: none; }
        
        .m-card {
            display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.7);
            border: 1px solid rgba(226, 232, 240, 0.15); padding: 8px 12px; border-radius: 8px;
            min-width: 240px; flex-shrink: 0; transition: 0.3s; box-shadow: inset 0 0 10px rgba(255,255,255,0.02);
        }
        .m-card.promo { border-color: var(--accent); box-shadow: inset 0 0 15px rgba(255,0,60,0.2); }
        .m-img { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; border: 1px solid var(--gold); }
        .m-info { display: flex; flex-direction: column; justify-content: center; }
        .m-title { font-family: var(--font-tech); font-size: 15px; font-weight: 800; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; letter-spacing: 0.5px;}
        .m-price { font-family: var(--font-num); font-size: 20px; color: var(--gold); line-height: 1; margin-top: 2px; text-shadow: 0 0 5px var(--gold-dim);}
        .m-stock { font-size: 9px; color: var(--silver-text); font-family: var(--font-tech); font-weight: bold; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; width: fit-content; margin-top: 4px; letter-spacing: 1px;}
        .m-stock.empty { color: var(--accent); background: rgba(255,0,60,0.1); border: 1px solid rgba(255,0,60,0.3);}

        /* --- BUTTON BAWAH (DIPERJELAS) --- */
        .bottom-action { margin-top: auto; padding: 15px 0 0; display: flex; flex-direction: column; align-items: center; z-index: 50;}
        
        .btn-cancel { width: 100%; padding: 16px; background: rgba(255,0,60,0.1); border: 1px solid var(--accent); color: var(--accent); font-family: var(--font-tech); font-size: 18px; font-weight: 900; letter-spacing: 2px; clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px); box-shadow: var(--accent-glow); text-align: center; cursor: pointer; display: none; transition: 0.2s;}
        .btn-cancel:active { background: var(--accent); color:#000; transform: scale(0.98); }
        
        /* TOMBOL RESET BARU */
        .btn-reset-session { 
            width: 100%; padding: 16px; margin-top: 12px; 
            background: transparent; border: 2px solid var(--silver-text); 
            color: var(--white); font-family: var(--font-tech); font-size: 16px; font-weight: 900; 
            letter-spacing: 2px; clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px); 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s;
        }
        .btn-reset-session:active { background: var(--silver-text); color: var(--bg-dark); transform: scale(0.98); }

        /* --- MODAL UI CUSTOM CYBERPUNK --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 99999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { width: 90%; max-width: 380px; background: rgba(5,10,21,0.95); border: 1px solid var(--gold); clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px); padding: 30px; text-align: center; position: relative; box-shadow: 0 0 20px var(--gold-dim); animation: zoomIn 0.2s ease-out;}
        @keyframes zoomIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
        .modal-title { font-family: var(--font-tech); font-weight: 800; color: var(--gold); font-size: 24px; margin-bottom: 15px; letter-spacing: 1px; text-shadow: 0 0 10px var(--gold-glow);}
        .modal-msg { font-family: var(--font-tech); color: #ccc; font-size: 18px; margin-bottom: 25px; line-height: 1.4; }
        .modal-btns { display: flex; gap: 15px; justify-content: center; }
        .btn-modal { flex: 1; padding: 12px; font-family: var(--font-tech); font-size: 18px; border: none; cursor: pointer; font-weight: bold; letter-spacing: 1px; clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px); }
        .btn-yes { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold-glow);}
        .btn-no { background: transparent; color: var(--accent); border: 1px solid var(--accent); box-shadow: var(--accent-glow);}
        .inp-prompt { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #444; color: #fff; font-family: var(--font-tech); font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center;}
        .inp-prompt:focus { border-color: var(--gold); outline: none; }

        /* --- QUEUE LIST MODAL --- */
        .queue-list-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 80000; flex-direction: column; padding: 20px; backdrop-filter: blur(10px); align-items: center; justify-content: center; animation: zoomIn 0.2s;}
        .ql-card { background: rgba(5,10,21,0.95); border: 1px solid var(--gold); width: 100%; max-width: 400px; margin: auto; overflow: hidden; display: flex; flex-direction: column; height: 70vh; box-shadow: 0 0 20px var(--gold-dim); position: relative; clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); }
        .ql-body { padding: 15px; flex: 1; overflow-y: auto; }
        .ql-body::-webkit-scrollbar { width: 3px; } .ql-body::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); } .ql-body::-webkit-scrollbar-thumb { background: var(--gold); }
        .btn-close-mini { width: 100%; padding: 15px; background: rgba(255,0,60,0.1); color: var(--accent); border: none; border-top: 1px solid var(--accent); font-family: var(--font-tech); font-size: 18px; font-weight: 800; letter-spacing: 2px; cursor: pointer; transition: 0.2s; box-shadow: var(--accent-glow); }
        .btn-close-mini:active { background: var(--accent); color: #000; }

        /* LOADING */
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease-out; }
        .loader-spinner { width: 50px; height: 50px; border: 3px solid #111; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; box-shadow: 0 0 20px var(--gold); }
        .loader-text { font-family: var(--font-tech); font-weight:900; color: var(--gold); font-size: 16px; letter-spacing: 3px; animation: pulseText 1s infinite; }
        @keyframes pulseText { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-spinner"></div>
        <div class="loader-text">MENYAMBUNGKAN...</div>
    </div>

    <div class="restore-overlay" id="restoreOverlay" style="display:none; position:fixed; inset:0; background:var(--bg-dark); z-index:9999999; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; background-image:var(--bg-pattern); background-size:25px 25px;">
        <i class="fas fa-id-badge" style="font-size:60px; color:var(--gold); margin-bottom:20px; filter:drop-shadow(0 0 10px var(--gold-glow));"></i>
        <h1 style="color:var(--silver); font-family:var(--font-tech); font-size:36px; margin:0 0 5px; text-shadow:0 0 10px var(--silver-dim); letter-spacing:2px;">SESI TERPUTUS</h1>
        <p style="color:var(--silver-text); font-family:'Inter', sans-serif; font-size:13px; margin-bottom:30px; max-width:300px; line-height:1.5;">Masukkan Plat Kendaraan Anda untuk masuk kembali ke sistem tanpa perlu scan QR ulang.</p>
        
        <input type="text" id="inpRestorePlat" placeholder="Cth: B 1234 XYZ" style="width:100%; max-width:320px; padding:18px; border-radius:12px; border:1px solid var(--gold); background:rgba(216,162,46,0.1); color:white; font-family:var(--font-num); font-size:28px; font-weight:bold; text-align:center; text-transform:uppercase; margin-bottom:20px; outline:none; box-shadow:0 0 15px var(--gold-dim); letter-spacing:2px;">
        
        <button onclick="restoreSessionProcess()" style="background:var(--gold); color:#000; border:none; padding:16px; font-family:var(--font-tech); font-size:20px; font-weight:900; border-radius:12px; cursor:pointer; width:100%; max-width:320px; margin-bottom:15px; box-shadow:0 0 15px rgba(216,162,46,0.4); letter-spacing:1px; transition:0.2s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">PULIHKAN SESI</button>
        <button onclick="window.location.href='antrian.html'" style="background:transparent; color:var(--accent); border:1px solid var(--accent); padding:15px; font-family:var(--font-tech); font-size:18px; font-weight:bold; border-radius:12px; cursor:pointer; width:100%; max-width:320px; letter-spacing:1px; box-shadow:var(--accent-glow); transition:0.2s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">DAFTAR BARU DI PORTAL</button>
    </div>

    <img src="logomlumaster.png" class="watermark-logo" alt="Watermark" onerror="this.style.display='none'">

    <div id="customModal" class="modal-overlay">
        <div class="modal-box">
            <div id="modalTitle" class="modal-title">TITLE</div>
            <div id="modalMsg" class="modal-msg">Message goes here...</div>
            <input type="text" id="modalInput" class="inp-prompt" style="display:none;" autocomplete="off">
            <div id="modalBtns" class="modal-btns"></div>
        </div>
    </div>

    <div class="header" ondblclick="triggerAdminPrompt()">
        <div class="main-title">FC KELAPA GADING</div>
        <div class="sub-title">MAKA LINTAS UTARA</div>
    </div>

    <div class="queue-bar-wrapper" onclick="openQueueList()">
        <div class="queue-bar">
            <div class="qb-left">
                <span class="qb-lbl"><i class="fas fa-users"></i> ANTRIAN SEKARANG</span>
                <div class="qb-val" id="nextQDisplay">--</div>
                <div class="qb-upcoming" id="upcomingQDisplay">TIDAK ADA ANTRIAN SELANJUTNYA</div>
            </div>
            <div class="qb-right">
                <div class="qb-tot" id="totalQDisplay">0</div>
            </div>
        </div>
    </div>

    <div class="slot-container" id="slotsContainer"></div>

    <div class="market-ticker-wrapper">
        <div class="mt-label"><i class="fas fa-shopping-cart"></i> PASAR MLU</div>
        <div class="mt-track" id="marketFeed">
            <div style="color:var(--silver-text); font-family:var(--font-tech); font-size:14px; margin-top:5px;">Memuat Katalog Pasar...</div>
        </div>
    </div>

    <div class="bottom-action">
        <button id="btnCancelQ" class="btn-cancel" onclick="cancelQueue()">❌ BATAL ANTRIAN</button>
        <button class="btn-reset-session" onclick="resetApp()"><i class="fas fa-sync-alt"></i> KELUAR / HAPUS SESI INI</button>
    </div>

    <div id="queueListModal" class="queue-list-modal">
        <div class="ql-card">
            <div style="padding:15px; text-align:center; border-bottom:1px dashed rgba(216,162,46,0.3); font-family:var(--font-tech); font-weight:800; font-size:24px; color:var(--gold); letter-spacing:1px; text-shadow:0 0 10px var(--gold-glow);">DAFTAR TUNGGU</div>
            <div id="qlBody" class="ql-body"></div>
            <button class="btn-close-mini" onclick="closeModal('queueListModal')">TUTUP</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, runTransaction, collection, addDoc, getDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // === KONFIGURASI FIREBASE ===
        const firebaseConfig = { apiKey: "AIzaSyB666i9lYWIpxOdkwpoX9EvFvHLmHczeq8", authDomain: "fcgadingnew22.firebaseapp.com", projectId: "fcgadingnew22", storageBucket: "fcgadingnew22.firebasestorage.app", messagingSenderId: "537736846678", appId: "1:537736846678:web:53788d71a196423ac08af7" };
        const STATION_LAT = -6.171583; const STATION_LNG = 106.899844; const MAX_DIST_KM = 0.2; 
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mainRef = doc(db, "antrian", "utama");

        // === DB STORE (UNTUK TICKER PASAR MLU) ===
        const fbStoreConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5" };
        const appStore = initializeApp(fbStoreConfig, "AppStore");
        const dbStore = getFirestore(appStore);

        const $ = (id) => document.getElementById(id);
        let localSlots = [null, null, null]; let localQueue = []; 

        // Fungsi Pembersih
        function cleanStr(s) { return s ? s.replace(/[^A-Z0-9]/gi, '').toUpperCase() : ''; }
        function cleanName(n) { return n ? n.replace(/👑/g, '').trim() : ''; } 
        function escapeHtml(text) { if (!text) return ""; return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
        function calculateDist(lat1, lon1, lat2, lon2) { const R = 6371; const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180; const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2; return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
        function formatK(num) { if(num >= 1000000) return (num/1000000).toFixed(1) + 'jt'; if(num >= 1000) return (num/1000).toFixed(0) + 'rb'; return num; }

        // --- SISTEM LOGGER SUPER DETAIL ---
        async function catatLogSuperDetail(action, nama, plat, detailStr) {
            try {
                await addDoc(collection(db, "mlu_super_logs"), {
                    waktu: new Date().toLocaleString('id-ID'),
                    timestamp: Date.now(),
                    nama: nama || "SYSTEM",
                    plat: plat || "-",
                    action: action,
                    detail: detailStr,
                    sumber: "SYSTEM_TV_LAYAR"
                });
            } catch(e) { console.error("Gagal log aktivitas:", e); }
        }

        // --- SISTEM UI MODAL CUSTOM ---
        window.closeCustomModal = () => { $('customModal').style.display = 'none'; $('modalInput').style.display = 'none'; $('modalInput').value = ''; };

        window.showAlert = (msg, title="INFO", callback=null) => {
            $('modalTitle').innerText = title; $('modalTitle').style.color = "var(--gold)"; $('modalTitle').style.textShadow = "0 0 10px var(--gold-glow)";
            $('modalMsg').innerHTML = msg;
            $('modalBtns').innerHTML = `<button class="btn-modal btn-yes" id="btnOkAlert">OK</button>`;
            $('btnOkAlert').onclick = () => { closeCustomModal(); if(callback) callback(); };
            $('customModal').style.display = 'flex';
        };

        window.showConfirm = (msg, callback, title="KONFIRMASI") => {
            $('modalTitle').innerText = title; $('modalTitle').style.color = "var(--gold)"; $('modalTitle').style.textShadow = "0 0 10px var(--gold-glow)";
            $('modalMsg').innerHTML = msg;
            $('modalBtns').innerHTML = `<button class="btn-modal btn-no" onclick="closeCustomModal()">BATAL</button><button class="btn-modal btn-yes" id="btnYesConfirm">YA</button>`;
            $('btnYesConfirm').onclick = () => { closeCustomModal(); callback(); };
            $('customModal').style.display = 'flex';
        };

        window.showPrompt = (msg, callback, title="INPUT DIBUTUHKAN") => {
            $('modalTitle').innerText = title; $('modalTitle').style.color = "var(--gold)"; $('modalTitle').style.textShadow = "0 0 10px var(--gold-glow)";
            $('modalMsg').innerHTML = msg;
            const inp = $('modalInput'); inp.style.display = 'block'; setTimeout(()=>inp.focus(), 100);
            $('modalBtns').innerHTML = `<button class="btn-modal btn-no" onclick="closeCustomModal()">BATAL</button><button class="btn-modal btn-yes" id="btnYesPrompt">SUBMIT</button>`;
            $('btnYesPrompt').onclick = () => { const val = inp.value; closeCustomModal(); callback(val); };
            $('customModal').style.display = 'flex';
        };

        window.closeModal = (id) => { $(id).style.display = 'none'; };

        // --- GATEKEEPER & PEMULIHAN SESI ---
        let myPlat = localStorage.getItem('myPlat');
        const isSuperAdmin = localStorage.getItem('sa_sess');

        if(!myPlat && !isSuperAdmin) {
            // Tampilkan Layar Pemulihan Sesi
            $('restoreOverlay').style.display = 'flex';
        }
        
        // HILANGKAN LOADING SCREEN BAIK DI SESI NORMAL MAUPUN SAAT MENAMPILKAN RESTORE OVERLAY
        setTimeout(() => { const ls = $('loading-screen'); if(ls) { ls.style.opacity = '0'; setTimeout(()=> ls.style.display = 'none', 500); } }, 1000);

        // FUNGSI PROSES PEMULIHAN SESI
        window.restoreSessionProcess = async () => {
            const p = $('inpRestorePlat').value.toUpperCase().replace(/\s+/g, '');
            if(!p) return showAlert("Masukkan Plat Kendaraan Anda terlebih dahulu!", "PERHATIAN");
            
            $('loading-screen').style.display = 'flex'; setTimeout(()=>$('loading-screen').style.opacity = '1',10);
            
            try {
                const snap = await getDoc(mainRef);
                if(snap.exists()) {
                    const d = snap.data();
                    const q = d.waitingQueue || [];
                    const s = d.chargingSlots || [];
                    
                    // Cek apakah plat ada di antrean ATAU di dalam slot
                    if(q.find(x => cleanStr(x.plat) === p) || s.find(y => y && y !== null && cleanStr(y.plat) === p)) {
                        localStorage.setItem('myPlat', p);
                        window.location.reload(); // Reload biar sistem jalan normal
                    } else {
                        $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',300);
                        showAlert("Plat nomor tidak ditemukan dalam Antrean Aktif. Silakan daftar baru melalui tombol Daftar Baru.", "TIDAK DITEMUKAN");
                    }
                }
            } catch(e) {
                $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',300);
                showAlert("Error: " + e.message, "GAGAL MEMULIHKAN");
            }
        };

        // --- ADMIN BYPASS ---
        window.triggerAdminPrompt = () => {
            showPrompt("MASUKKAN KODE AKSES:", (pass) => {
                if(pass === "2505") { window.location.href = "admin.html"; } 
                else if (pass === "090815") { 
                    if(localStorage.getItem('sa_sess')) { localStorage.removeItem('sa_sess'); showAlert("GOD MODE MATI."); } 
                    else { localStorage.setItem('sa_sess', '1'); showAlert("GOD MODE AKTIF (Bypass GPS)."); } 
                    setTimeout(() => location.reload(), 1500); 
                }
                else if (pass) { showAlert("KODE SALAH!", "AKSES DITOLAK"); }
            }, "SYSTEM OVERRIDE");
        };

        // --- REALTIME LISTENER (UPDATE UI) ---
        onSnapshot(mainRef, (snap) => {
            if (!snap.exists()) return; 
            const d = snap.data(); localSlots = d.chargingSlots || [null, null, null]; localQueue = d.waitingQueue || []; 
            
            // --- AUTO WIPE JIKA DATA DI SERVER SUDAH TIDAK ADA ---
            if (myPlat && !isSuperAdmin) {
                const inQueue = localQueue.some(q => cleanStr(q.plat) === cleanStr(myPlat));
                const inSlot = localSlots.some(s => s && s !== null && cleanStr(s.plat) === cleanStr(myPlat));
                // JANGAN WIPE JIKA KEDUA DATA SUDAH TERKONFIRMASI HILANG
                if (!inQueue && !inSlot) {
                    localStorage.removeItem('myPlat'); 
                    window.location.reload(); // Otomatis nampilin menu Restore Sesi
                    return;
                }
            }

            if(myPlat || isSuperAdmin) updateUI();
        });

        function updateUI() {
            const container = $('slotsContainer'); container.innerHTML = ''; let myQIndex = -1;
            if (myPlat && localQueue.length > 0) { myQIndex = localQueue.findIndex(q => cleanStr(q.plat) === cleanStr(myPlat)); }
            
            const btnCancel = $('btnCancelQ'); 
            if(myQIndex > -1) { btnCancel.style.display = 'block'; btnCancel.innerHTML = `❌ BATAL ANTRIAN (URUTAN #${myQIndex+1})`; } else { btnCancel.style.display = 'none'; }

            // UPDATE NEXT QUEUE DISPLAY
            $('nextQDisplay').innerText = localQueue.length > 0 ? `1. ${escapeHtml(cleanName(localQueue[0].userName))} (${localQueue[0].plat})` : "--";
            
            // UPDATE UPCOMING QUEUE
            let upcomingHtml = '';
            if(localQueue.length > 1) {
                for(let k=1; k < Math.min(4, localQueue.length); k++) {
                    upcomingHtml += `<span style="color:var(--gold); margin-right:15px;"><i class="fas fa-chevron-right" style="font-size:10px; opacity:0.5;"></i> ${k+1}. ${escapeHtml(cleanName(localQueue[k].userName))}</span>`;
                }
            }
            $('upcomingQDisplay').innerHTML = upcomingHtml || '<span style="color:#666;"><i class="fas fa-minus-circle"></i> TIDAK ADA ANTREAN SELANJUTNYA</span>';

            localSlots.forEach((s, i) => {
                const isActive = s !== null; const div = document.createElement('div'); div.className = `armor-card ${isActive ? 'active' : ''}`;
                
                if (isActive) {
                    const role = s.role ? s.role.toUpperCase() : "GUEST"; 
                    const isMe = (cleanStr(s.plat) === cleanStr(myPlat)); 
                    let kudetaHTML = '', timerHTML = '';
                    const durationMs = Date.now() - (s.startTime || Date.now()); const durationMin = Math.floor(durationMs / 60000);
                    
                    let batVal = s.batreSisa || (s.batre ? s.batre.replace('%','') : null) || (s.battery ? s.battery.replace('%','') : "-");
                    let safeName = cleanName(s.userName); 
                    
                    if(isMe) timerHTML = `<div class="mini-timer" style="color:var(--gold)"><span class="mini-batre"><i class="fas fa-bolt"></i> ${batVal}%</span> | ${durationMin} MIN (ANDA)</div>`; 
                    else {
                        timerHTML = `<div class="mini-timer"><span class="mini-batre"><i class="fas fa-bolt"></i> ${batVal}%</span> | ${durationMin} MIN</div>`; 
                        if (myQIndex === 0 && durationMin >= 20) { kudetaHTML = `<button class="btn-kudeta" onclick="event.stopPropagation(); window.userTriggerKudeta(${i}, '${escapeHtml(s.plat)}')">⚡ KUDETA</button>`; } 
                        else if (myQIndex === 1 && durationMin >= 25) { kudetaHTML = `<button class="btn-kudeta" onclick="event.stopPropagation(); window.userTriggerKudeta(${i}, '${escapeHtml(s.plat)}')">⚡ KUDETA</button>`; }
                    }
                    
                    div.innerHTML = `
                        <div class="armor-inner">
                            <div class="armor-num">${i+1}</div>
                            <div class="armor-content">
                                <div class="ac-top">
                                    <div class="info-name">${escapeHtml(safeName)}</div>
                                    <div class="armor-badge">${getBadgeHTML(role)}</div>
                                </div>
                                <div class="ac-bot">
                                    <div class="info-plat">${s.plat}</div>
                                    <div class="armor-actions">
                                        ${timerHTML}
                                        ${kudetaHTML}
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    if(isMe) { div.onclick = () => stopCharging(i); }
                } else {
                    let btnHTML = ''; 
                    if (localQueue.length === 0 || myQIndex === 0) btnHTML = `<button class="btn-pilih-slot" onclick="window.selectSlot(${i})">PILIH SLOT</button>`; 
                    else if (myQIndex > 0) btnHTML = `<div class="badge-antrian">ANTRIAN ${myQIndex + 1}</div>`; 
                    else btnHTML = `<div class="badge-locked">LOCKED</div>`;
                    
                    div.innerHTML = `
                        <div class="armor-inner">
                            <div class="armor-num" style="color:rgba(255,255,255,0.2); border-color:rgba(255,255,255,0.2)">${i+1}</div>
                            <div class="armor-content">
                                <div class="ac-top">
                                    <div class="info-name" style="color:#666;">TERSEDIA</div>
                                </div>
                                <div class="ac-bot">
                                    <div class="info-plat" style="color:#444; letter-spacing:3px;">OPEN</div>
                                    <div class="armor-actions">${btnHTML}</div>
                                </div>
                            </div>
                        </div>`;
                }
                container.appendChild(div);
            });
            $('totalQDisplay').innerText = localQueue.length; 
        }

        function getBadgeHTML(r) {
            if (!r || r === "GUEST") return ""; 
            if (r.includes("SENYAP") || r.includes("NINJA")) return `<div class="tactical-badge b-ninja"><div class="tb-icon"><i class="fas fa-user-ninja"></i></div><div class="tb-text"><div class="tb-role" style="font-size:8px;">PASUKAN SENYAP</div></div></div>`;
            if (r.includes("KELUARGA") || r === "MEMBER") return `<div class="tactical-badge b-family"><div class="tb-icon"><i class="fas fa-heart"></i></div><div class="tb-text"><div class="tb-role">KELUARGA MLU</div></div></div>`;
            let css = "b-cyan"; let icon = "fa-user"; let label = "MEMBER"; let roleTxt = r;
            if (r.includes("PEMBINA")) { css="b-platinum"; icon="fa-star"; label="SENIOR"; roleTxt="PEMBINA"; }
            else if (r.includes("WAKETUM")) { css="b-gold"; icon="fa-chess-king"; label="CO-LEAD"; roleTxt="WAKETUM"; } 
            else if (r.includes("KETUM")) { css="b-gold"; icon="fa-crown"; label="LEADER"; roleTxt="KETUM"; }
            else if (r.includes("VIP")) { css="b-vip"; icon="fa-gem"; label="GUEST"; roleTxt="VIP"; }
            else if (r.includes("DONATUR")) { css="b-gold"; icon="fa-hand-holding-usd"; label="SPONSOR"; roleTxt="DONATUR"; }
            return `<div class="tactical-badge ${css}"><div class="tb-icon"><i class="fas ${icon}"></i></div><div class="tb-text">${label ? `<div class="tb-label">${label}</div>` : ''}<div class="tb-role">${roleTxt}</div></div></div>`;
        }

        // ========================================================
        // FUNGSI TRANSAKSI IMMUTABLE ANTI-MENTAL (BUG FIXED)
        // ========================================================

        window.selectSlot = async (i) => { 
            showConfirm(`Anda yakin ingin memasuki SLOT 0${i+1}?`, () => { 
                let userMasuk = null;
                $('loading-screen').style.display = 'flex'; setTimeout(()=>$('loading-screen').style.opacity = '1',10);
                
                runTransaction(db, async(t)=>{ 
                    const d = (await t.get(mainRef)).data(); 
                    if(d.chargingSlots[i]) throw new Error("SLOT SUDAH TERISI!"); 
                    
                    let q = [...(d.waitingQueue || [])]; 
                    const idx = q.findIndex(x => cleanStr(x.plat) === cleanStr(myPlat)); 
                    if(idx === -1) throw new Error("DATA ANTRIAN ANDA TIDAK DITEMUKAN!"); 
                    
                    // Gunakan metode Object Copying (Immutable) agar tidak bentrok dengan Cache Optimistic Firebase
                    const oldUser = q[idx]; 
                    q.splice(idx, 1); 
                    userMasuk = { ...oldUser, startTime: Date.now() }; 
                    
                    let newSlots = [...(d.chargingSlots || [null, null, null])];
                    newSlots[i] = userMasuk; 
                    
                    t.update(mainRef, { chargingSlots: newSlots, waitingQueue: q }); 
                }).then(() => { 
                    if(userMasuk) {
                        catatLogSuperDetail("MASUK_SLOT", userMasuk.userName, userMasuk.plat, `Pindah dari Daftar Tunggu ke Slot 0${i+1} dengan sisa baterai ${userMasuk.batreSisa || '-'}%`);
                    }
                    $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',500); 
                }).catch(e => { 
                    $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',500); 
                    showAlert(e.message || e, "ERROR"); 
                }); 
            }, "MASUK SLOT"); 
        };

        window.pilihSlotEks = (i) => {
            showConfirm(`Anda yakin ingin memasuki SLOT 0${i+1}?`, () => {
                window.showActionLoader();
                let myObj = null;
                runTransaction(db, async(t)=>{ 
                    const d = (await t.get(mainRef)).data(); if(d.chargingSlots[i]) throw new Error("SLOT SUDAH TERISI!"); 
                    let q = [...(d.waitingQueue || [])]; 
                    const idx = q.findIndex(x => cleanStr(x.plat) === cleanStr(myPlat)); 
                    if(idx === -1) throw new Error("DATA ANDA TIDAK DITEMUKAN DI ANTREAN!"); 
                    
                    // Immutable Object
                    const oldUser = q[idx];
                    q.splice(idx, 1); 
                    myObj = { ...oldUser, startTime: Date.now() }; 
                    
                    let newSlots = [...(d.chargingSlots || [null, null, null])];
                    newSlots[i] = myObj; 
                    
                    t.update(mainRef, { chargingSlots: newSlots, waitingQueue: q }); 
                }).then(() => { 
                    if(myObj) catatLogSuperDetail("MASUK_SLOT", myObj.userName, myObj.plat, `Pindah dari Antrean ke Slot 0${i+1}`);
                    window.hideActionLoader(); closeModal('mainModal'); 
                }).catch(e => { window.hideActionLoader(); showAlert(e.message || e, "INFO"); }); 
            }, "MASUK SLOT");
        }

        window.stopCharging = (i) => { 
            showConfirm("Apakah Anda yakin sudah selesai dan ingin mengosongkan slot ini?", () => {
                let userSelesai = null;
                $('loading-screen').style.display = 'flex'; setTimeout(()=>$('loading-screen').style.opacity = '1',10);
                
                runTransaction(db, async(t)=>{ 
                    const d = (await t.get(mainRef)).data(); 
                    let slots = [...(d.chargingSlots || [null, null, null])];
                    userSelesai = slots[i]; 
                    slots[i] = null; 
                    
                    t.update(mainRef, {chargingSlots: slots}); 
                }).then(() => { 
                    if(userSelesai) {
                        catatLogSuperDetail("SELESAI_CHARGING", userSelesai.userName, userSelesai.plat, `Menyelesaikan pengisian daya di Slot 0${i+1} dan mengosongkan tempat.`);
                    }
                    localStorage.removeItem('myPlat'); 
                    window.location.reload(); 
                }).catch(e=>{ 
                    $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',500);
                    showAlert(e.message || e, "GAGAL"); 
                }); 
            }, "SELESAI CHARGING?");
        };
        
        window.userTriggerKudeta = (idx, platVictim) => {
            showConfirm(`Anda akan mengambil alih paksa slot milik ${platVictim}. Lanjutkan?`, () => {
                let userKudeta = null;
                $('loading-screen').style.display = 'flex'; setTimeout(()=>$('loading-screen').style.opacity = '1',10);
                
                runTransaction(db, async(t) => {
                    const d = (await t.get(mainRef)).data();
                    let q = [...(d.waitingQueue || [])];
                    
                    const myIdx = q.findIndex(x => cleanStr(x.plat) === cleanStr(myPlat));
                    if(myIdx === -1) throw new Error("Anda tidak terdaftar di antrian!");
                    
                    // Immutable Object Modification
                    const oldUser = q[myIdx];
                    q.splice(myIdx, 1); 
                    userKudeta = {
                        ...oldUser,
                        userName: cleanName(oldUser.userName), 
                        role: "KUDETA",
                        startTime: Date.now()
                    };
                    
                    let newSlots = [...(d.chargingSlots || [null, null, null])];
                    newSlots[idx] = userKudeta;
                    
                    t.update(mainRef, {chargingSlots: newSlots, waitingQueue: q});
                }).then(() => { 
                    if(userKudeta) {
                        catatLogSuperDetail("KUDETA", userKudeta.userName, userKudeta.plat, `Mengambil alih secara paksa Slot 0${idx+1} (Menggusur plat ${platVictim})`);
                    }
                    $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',500);
                    showAlert("Slot berhasil diambil alih!", "KUDETA SUKSES"); 
                }).catch(e => { 
                    $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',500);
                    showAlert(e.message || e, "GAGAL KUDETA"); 
                });
            }, "PERINGATAN KUDETA!");
        };

        window.cancelQueue = () => { 
            showConfirm("Apakah Anda yakin ingin membatalkan antrian dan keluar dari sistem?", () => { 
                let userBatal = null;
                $('loading-screen').style.display = 'flex'; setTimeout(()=>$('loading-screen').style.opacity = '1',10);
                
                runTransaction(db, async(t) => { 
                    const d = (await t.get(mainRef)).data(); 
                    let q = [...(d.waitingQueue || [])];
                    
                    userBatal = q.find(x => cleanStr(x.plat) === cleanStr(myPlat));
                    const newQ = q.filter(x => cleanStr(x.plat) !== cleanStr(myPlat)); 
                    
                    t.update(mainRef, { waitingQueue: newQ }); 
                }).then(() => { 
                    if(userBatal) {
                        catatLogSuperDetail("BATAL_ANTREAN", userBatal.userName, userBatal.plat, `Keluar dan membatalkan antrean secara mandiri dari System TV.`);
                    }
                    localStorage.removeItem('myPlat'); 
                    window.location.reload(); 
                }).catch(e => { 
                    $('loading-screen').style.opacity = '0'; setTimeout(()=>$('loading-screen').style.display = 'none',500);
                    showAlert(e.message || e, "GAGAL"); 
                }); 
            }, "BATAL ANTRIAN?"); 
        };
        
        window.openQueueList = () => { 
            const body = $('qlBody'); body.innerHTML = ''; 
            if(localQueue.length === 0) { body.innerHTML = '<div style="text-align:center; padding:20px; color:#666; font-family:var(--font-tech);">TIDAK ADA ANTRIAN</div>'; } 
            else { localQueue.forEach((q, i) => { 
                let bat = q.batreSisa || (q.batre ? q.batre.replace('%','') : null) || (q.battery ? q.battery.replace('%','') : "-");
                let safeName = cleanName(q.userName);
                body.innerHTML += `<div style="background:rgba(216,162,46,0.05); margin:0 0 10px 0; padding:15px; border-left:4px solid var(--gold); display:flex; justify-content:space-between; align-items:center; border-radius:0 4px 4px 0; border:1px solid rgba(216,162,46,0.1);"><div><div style="font-family:'Teko'; font-size:36px; color:#fff; letter-spacing:1px; line-height:1; text-shadow:0 0 10px rgba(255,255,255,0.2);">${q.plat} <span style="font-size:16px; color:var(--silver); text-shadow:0 0 5px var(--silver-glow);"><i class=\"fas fa-bolt\"></i> ${bat}%</span></div><div style="font-family:'Rajdhani'; font-size:16px; color:var(--silver-text); font-weight:bold; text-transform:uppercase;">${safeName}</div></div><div style="font-family:'Rajdhani'; font-size:14px; color:#000; background:var(--gold); padding:4px 10px; font-weight:800; border-radius:4px; box-shadow:0 0 10px var(--gold-glow);\">ANTRIAN #${i+1}</div></div>`; 
            }); } 
            $('queueListModal').style.display = 'flex'; 
        };
        
        // --- FUNGSI RESET APLIKASI DENGAN TOMBOL JELAS ---
        window.resetApp = () => showConfirm("Hapus sesi aplikasi dari perangkat ini dan kembali ke menu utama?", () => { localStorage.removeItem('myPlat'); window.location.reload(); }, "RESET SESI");

        // === LOGIKA MARKET TICKER CAROUSEL (NEW HOLOGRAM UI) ===
        let tickerInterval;
        onSnapshot(query(collection(dbStore, 'mlu_store'), orderBy('timestamp', 'desc')), (snap) => {
            const feed = $('marketFeed');
            if (snap.empty) { feed.innerHTML = '<div style="color:#666; font-family:var(--font-tech); font-size:14px;">Belum ada barang di pasar.</div>'; return; }
            
            feed.innerHTML = '';
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const img = p.image || 'https://placehold.co/100x100/111/D8A22E?text=MLU';
                const priceStr = formatK(p.price);
                const isKampas = p.title.toLowerCase().includes('kampas') || p.title.toLowerCase().includes('rem');
                
                const stockVal = p.stock !== undefined ? p.stock : 99;
                let stockHTML = `<div class="m-stock"><i class="fas fa-box"></i> SISA: ${stockVal}</div>`;
                if(stockVal <= 0) stockHTML = `<div class="m-stock empty"><i class="fas fa-times-circle"></i> HABIS TERJUAL</div>`;

                feed.innerHTML += `
                    <div class="m-card ${isKampas ? 'promo' : ''}">
                        <img src="${img}" class="m-img">
                        <div class="m-info">
                            <div class="m-title">${p.title}</div>
                            <div class="m-price">Rp ${priceStr}</div>
                            ${stockHTML}
                        </div>
                    </div>
                `;
            });

            // Auto Scroll Ticker Logic (Super Smooth Continuous)
            clearInterval(tickerInterval);
            tickerInterval = setInterval(() => {
                if (feed.scrollLeft >= feed.scrollWidth - feed.clientWidth - 5) {
                    feed.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    feed.scrollBy({ left: 2, behavior: 'auto' });
                }
            }, 30); 
            
            // Berhenti pas disentuh layar TV (jika touch screen)
            feed.onpointerdown = () => clearInterval(tickerInterval);
            feed.onpointerup = () => {
                clearInterval(tickerInterval);
                tickerInterval = setInterval(() => {
                    if (feed.scrollLeft >= feed.scrollWidth - feed.clientWidth - 5) { feed.scrollTo({ left: 0, behavior: 'smooth' }); } 
                    else { feed.scrollBy({ left: 2, behavior: 'auto' }); }
                }, 30);
            };
        });

    </script>
</body>
</html>
